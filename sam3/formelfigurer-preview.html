<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAM3 — Formelfigurer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9;color:#0f172a}.top{background:#0f172a;color:white;padding:34px 20px}.wrap{max-width:1040px;margin:auto}.badge{display:inline-block;background:rgba(220,38,38,.18);border:1px solid rgba(248,113,113,.35);color:#fecaca;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}h1{font-size:42px;letter-spacing:-1px;margin-bottom:8px}.top p{color:#cbd5e1;max-width:780px}.controls{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:16px;margin:-20px auto 18px;box-shadow:0 1px 3px rgba(15,23,42,.08)}.btns{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #e2e8f0;background:white;border-radius:999px;padding:9px 12px;font-weight:900;cursor:pointer}.btn.active,.btn:hover{background:#fef2f2;border-color:#fecaca;color:#991b1b}.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:18px;box-shadow:0 1px 3px rgba(15,23,42,.08);margin-bottom:18px}.cardHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.card h2{font-size:22px;letter-spacing:-.3px}.formula{font-family:Georgia,serif;font-size:24px;font-weight:900;background:#f8fafc;border:1px solid #e2e8f0;border-radius:13px;padding:8px 12px;white-space:nowrap}.stage{background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:10px}.stage svg{width:100%;height:auto;display:block;background:white;border-radius:16px;border:1px solid #e2e8f0;max-height:70vh}.note{font-size:13px;color:#64748b;margin-top:10px}.fig text{font-family:Inter,system-ui,sans-serif}.serif{font-family:Georgia,'Times New Roman',serif}.navy{fill:#0f172a}.muted{fill:#64748b}.red{fill:#dc2626}.blue{fill:#2563eb}.green{fill:#15803d}.orange{fill:#ea580c}.heavy{font-weight:900}.bold{font-weight:800}.axis{stroke:#0f172a;stroke-width:3}.guide{stroke:#334155;stroke-width:2;stroke-dasharray:6 6}.ft{font-family:Georgia,'Times New Roman',serif;font-size:38px;font-weight:900}.title{font-size:28px;font-weight:900}.label{font-size:19px;font-weight:900}.small{font-size:14px;font-weight:700}.footer{text-align:center;color:#94a3b8;font-size:12px;padding:30px}@media(max-width:640px){h1{font-size:31px}.cardHead{flex-direction:column}.formula{font-size:20px}.stage{padding:6px}}
</style>
</head>
<body>
<section class="top"><div class="wrap"><div class="badge">SAM3 · figurfix preview</div><h1>Rensede formelfigurer</h1><p>Dette er en kompakt preview av de korrigerte figurene. Målet er at alt skal være synlig i rammen, uten scrolling, uten overlapp og uten tilfeldige store piler som dekker innholdet.</p></div></section>
<main class="wrap"><section class="controls"><div class="btns" id="tabs"></div></section><section id="cards"></section></main><footer class="footer">StudieHub · SAM3 formelfigurer preview</footer>
<script>
const figs=[
{id:'bnp',t:'BNP etter utgiftsmetoden',f:'Y = C + I + G + NX',n:'BNP bygges opp som summen av etterspørselskomponentene.',svg:figBnp},
{id:'nx',t:'Nettoeksport',f:'NX = X − M',n:'Nettoeksport er eksport minus import.',svg:figNx},
{id:'sparing',t:'Nasjonal sparing',f:'S = Y − C − G',n:'Sparing er restleddet etter konsum og offentlige kjøp.',svg:figSparing},
{id:'s-i-nx',t:'Sparing, investering og nettoeksport',f:'S = I + NX',n:'I åpen økonomi går sparing til investering eller nettoeksport.',svg:figSIX},
{id:'cd',t:'Cobb–Douglas',f:'Y = A K^α L^(1−α)',n:'Produksjon kommer fra teknologi, kapital og arbeid.',svg:figCD},
{id:'per-worker',t:'Produksjon per arbeider',f:'y = A k^α',n:'Kurven viser avtakende grenseprodukt av kapital per arbeider.',svg:figPerWorker},
{id:'solow-dk',t:'Solow: kapitalakkumulasjon',f:'Δk = s f(k) − (δ+n)k',n:'Avstanden mellom kurvene viser endringen i kapital per arbeider.',svg:figSolowGap},
{id:'steady',t:'Solow: steady state',f:'s f(k*) = (δ+n)k*',n:'I steady state er Δk = 0.',svg:figSteady},
{id:'natural-u',t:'Naturlig ledighet',f:'u* = s/(s+f)',n:'Badekaret viser strømmen inn og ut av ledighet.',svg:figNaturalU},
{id:'phillips',t:'Forventningsutvidet Phillipskurve',f:'π = πᵉ + κỸ',n:'Produksjonsgapet påvirker inflasjonen rundt forventet inflasjon.',svg:figPhillips}
];
function defs(){return `<defs><marker id="aN" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#0f172a"/></marker><marker id="aG" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#16a34a"/></marker><marker id="aR" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#dc2626"/></marker><marker id="aB" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker></defs>`}
function head(t,f){return `<text x="500" y="50" text-anchor="middle" class="title navy">${t}</text><text x="500" y="98" text-anchor="middle" class="ft navy">${f}</text>`}
function note(y,txt){return `<rect x="70" y="${y}" width="860" height="56" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="500" y="${y+36}" text-anchor="middle" class="small navy">${txt}</text>`}
function box(x,y,w,h,bg,st,t,s,sub){return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="18" fill="${bg}" stroke="${st}" stroke-width="3"/><text x="${x+w/2}" y="${y+55}" text-anchor="middle" class="label" fill="${st}">${t}</text><text x="${x+w/2}" y="${y+98}" text-anchor="middle" class="title" fill="${st}">${s}</text><text x="${x+w/2}" y="${y+132}" text-anchor="middle" class="small navy">${sub}</text>`}
function bnpSmallBox(x,bg,st,title,sym,sub){return `<rect x="${x}" y="210" width="142" height="142" rx="18" fill="${bg}" stroke="${st}" stroke-width="3"/><text x="${x+71}" y="260" text-anchor="middle" class="small" fill="${st}">${title}</text><text x="${x+71}" y="303" text-anchor="middle" class="title" fill="${st}">${sym}</text><text x="${x+71}" y="333" text-anchor="middle" class="small navy">${sub}</text>`}
function op(x,s){return `<text x="${x}" y="294" text-anchor="middle" class="label navy">${s}</text>`}
function figBnp(){return `<svg viewBox="0 0 1000 620">${defs()}${head('BNP etter utgiftsmetoden','Y = C + I + G + NX')}<rect x="72" y="210" width="120" height="142" rx="18" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/><text x="132" y="286" text-anchor="middle" class="title navy">Y</text><text x="132" y="323" text-anchor="middle" class="small navy">BNP</text>${op(223,'=')}${bnpSmallBox(255,'#fef2f2','#dc2626','Konsum','C','husholdn.')}${op(425,'+')}${bnpSmallBox(455,'#eff6ff','#2563eb','Investering','I','bedrifter')}${op(625,'+')}${bnpSmallBox(655,'#f0fdf4','#15803d','Offentlig','G','stat/komm.')}${op(825,'+')}${bnpSmallBox(855,'#fff7ed','#ea580c','Nettoeksport','NX','X − M')}${note(470,'BNP fra utgiftssiden er summen av etterspørselen etter norsk produksjon.')}</svg>`}
function figNx(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Nettoeksport','NX = X − M')}<rect x="90" y="210" width="250" height="180" rx="22" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="215" y="305" text-anchor="middle" class="title blue">Norge</text><rect x="660" y="210" width="250" height="180" rx="22" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/><text x="785" y="305" text-anchor="middle" class="title green">Utlandet</text><line x1="345" y1="255" x2="650" y2="255" stroke="#16a34a" stroke-width="12" marker-end="url(#aG)"/><line x1="655" y1="345" x2="350" y2="345" stroke="#dc2626" stroke-width="12" marker-end="url(#aR)"/><text x="500" y="235" text-anchor="middle" class="label green">Eksport (X)</text><text x="500" y="392" text-anchor="middle" class="label red">Import (M)</text>${note(480,'Nettoeksport er eksport minus import. NX > 0 når eksporten er størst.')}</svg>`}
function figSparing(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Nasjonal sparing','S = Y − C − G')}<rect x="95" y="205" width="810" height="125" rx="20" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/><rect x="95" y="205" width="330" height="125" rx="20" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><rect x="425" y="205" width="250" height="125" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><rect x="675" y="205" width="230" height="125" rx="20" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/><text x="260" y="275" text-anchor="middle" class="label red">Konsum (C)</text><text x="550" y="275" text-anchor="middle" class="label blue">Offentlig (G)</text><text x="790" y="275" text-anchor="middle" class="label green">Sparing (S)</text><text x="500" y="370" text-anchor="middle" class="small navy">Total inntekt Y deles i C, G og resten: S</text>${note(470,'Nasjonal sparing er den delen av inntekten som ikke brukes til privat konsum eller offentlige kjøp.')}</svg>`}
function figSIX(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Sparing, investering og nettoeksport','S = I + NX')}<rect x="90" y="235" width="240" height="150" rx="22" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/><text x="210" y="315" text-anchor="middle" class="label green">Sparing (S)</text><line x1="335" y1="310" x2="470" y2="310" stroke="#0f172a" stroke-width="7" marker-end="url(#aN)"/><rect x="520" y="185" width="310" height="110" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="675" y="250" text-anchor="middle" class="label blue">Investeringer (I)</text><rect x="520" y="335" width="310" height="110" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="675" y="400" text-anchor="middle" class="label orange">Nettoeksport (NX)</text><path d="M470 310 C500 310 500 240 518 240" fill="none" stroke="#0f172a" stroke-width="6" marker-end="url(#aN)"/><path d="M470 310 C500 310 500 390 518 390" fill="none" stroke="#0f172a" stroke-width="6" marker-end="url(#aN)"/>${note(490,'I åpen økonomi må sparing ende opp som innenlandsk investering eller nettoeksport.')}</svg>`}
function figCD(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Cobb–Douglas','Y = A K^α L^(1−α)')}<rect x="90" y="155" width="255" height="85" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/><text x="218" y="207" text-anchor="middle" class="label green">Teknologi (A)</text><rect x="90" y="270" width="255" height="85" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="218" y="322" text-anchor="middle" class="label red">Kapital (K^α)</text><rect x="90" y="385" width="255" height="85" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="218" y="437" text-anchor="middle" class="label blue">Arbeid (L^(1−α))</text><rect x="445" y="245" width="210" height="140" rx="24" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/><text x="550" y="305" text-anchor="middle" class="label navy">Produksjons-</text><text x="550" y="337" text-anchor="middle" class="label navy">maskin</text><line x1="350" y1="198" x2="443" y2="280" stroke="#15803d" stroke-width="6" marker-end="url(#aG)"/><line x1="350" y1="312" x2="443" y2="315" stroke="#dc2626" stroke-width="6" marker-end="url(#aR)"/><line x1="350" y1="427" x2="443" y2="350" stroke="#2563eb" stroke-width="6" marker-end="url(#aB)"/><line x1="655" y1="315" x2="800" y2="315" stroke="#0f172a" stroke-width="7" marker-end="url(#aN)"/><rect x="805" y="250" width="130" height="130" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="870" y="326" text-anchor="middle" class="title orange">Y</text><text x="260" y="530" text-anchor="middle" class="small navy">α = kapitalens vekt</text><text x="700" y="530" text-anchor="middle" class="small navy">1−α = arbeidets vekt</text></svg>`}
function figPerWorker(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Produksjon per arbeider','y = A k^α')}<line x1="150" y1="480" x2="850" y2="480" class="axis" marker-end="url(#aN)"/><line x1="150" y1="480" x2="150" y2="150" class="axis" marker-end="url(#aN)"/><path d="M150 480 C250 310 405 230 570 205 C680 188 765 185 825 185" fill="none" stroke="#2563eb" stroke-width="6"/><text x="620" y="175" class="label blue serif">y = A k^α</text><text x="500" y="545" text-anchor="middle" class="label navy">Kapital per arbeider (k)</text><text x="115" y="155" text-anchor="end" class="label navy">y</text><rect x="610" y="315" width="270" height="82" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="745" y="348" text-anchor="middle" class="small navy">Kurven flater ut:</text><text x="745" y="377" text-anchor="middle" class="small blue">avtakende grenseprodukt</text>${note(555,'Mer kapital per arbeider øker produksjonen per arbeider, men effekten avtar.')}</svg>`}
function solowBase(mode){let extra=mode==='gap'?`<line x1="415" y1="255" x2="415" y2="373" stroke="#2563eb" stroke-width="5"/><circle cx="415" cy="255" r="8" fill="#15803d"/><circle cx="415" cy="373" r="8" fill="#dc2626"/><text x="438" y="320" class="label blue serif">Δk</text><rect x="690" y="330" width="230" height="88" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="805" y="362" text-anchor="middle" class="small navy">Når s f(k) &gt;</text><text x="805" y="389" text-anchor="middle" class="small red">(δ+n)k</text><text x="805" y="414" text-anchor="middle" class="small navy">øker k.</text>`:`<circle cx="610" cy="220" r="9" fill="#0f172a"/><line x1="610" y1="480" x2="610" y2="220" class="guide"/><text x="590" y="525" class="label navy serif">k*</text><text x="385" y="525" class="small green">Δk &gt; 0</text><text x="690" y="525" class="small red">Δk &lt; 0</text>`;return `<line x1="120" y1="480" x2="860" y2="480" class="axis" marker-end="url(#aN)"/><line x1="120" y1="480" x2="120" y2="130" class="axis" marker-end="url(#aN)"/><path d="M120 480 C235 260 420 210 610 220 C725 226 805 245 860 260" fill="none" stroke="#15803d" stroke-width="6"/><line x1="120" y1="480" x2="860" y2="140" stroke="#dc2626" stroke-width="5"/><text x="745" y="225" class="label green serif">s f(k)</text><text x="745" y="160" class="label red serif">(δ+n)k</text><text x="505" y="545" text-anchor="middle" class="label navy">Kapital per arbeider (k)</text><text x="92" y="135" text-anchor="end" class="small navy">investering</text><line x1="415" y1="480" x2="415" y2="255" class="guide"/>${extra}`}
function figSolowGap(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Solow: kapitalakkumulasjon','Δk = s f(k) − (δ+n)k')}${solowBase('gap')}${note(555,'Kapital per arbeider øker når investeringene er større enn break-even-investeringen.')}</svg>`}
function figSteady(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Solow: steady state','s f(k*) = (δ+n)k*')}${solowBase('steady')}${note(555,'I steady state er investering akkurat lik det som trengs for å holde k konstant.')}</svg>`}
function figNaturalU(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Naturlig ledighet','u* = s/(s+f)')}<rect x="90" y="185" width="230" height="90" rx="18" fill="#fff" stroke="#dc2626" stroke-width="3"/><text x="205" y="222" text-anchor="middle" class="label red">Separasjoner (s)</text><text x="205" y="252" text-anchor="middle" class="small navy">inn i ledighet</text><rect x="680" y="185" width="230" height="90" rx="18" fill="#fff" stroke="#15803d" stroke-width="3"/><text x="795" y="222" text-anchor="middle" class="label green">Jobbfinning (f)</text><text x="795" y="252" text-anchor="middle" class="small navy">ut av ledighet</text><path d="M355 330 C395 300 605 300 645 330 L615 440 C570 470 430 470 385 440 Z" fill="#eff6ff" stroke="#0f172a" stroke-width="4"/><path d="M395 385 C450 365 520 405 605 382 L590 430 C530 452 450 452 405 430 Z" fill="#bfdbfe"/><text x="500" y="415" text-anchor="middle" class="title navy">Ledighet (u*)</text><path d="M250 276 C300 305 325 322 355 342" fill="none" stroke="#dc2626" stroke-width="8" marker-end="url(#aR)"/><path d="M645 382 C685 375 715 355 750 280" fill="none" stroke="#16a34a" stroke-width="8" marker-end="url(#aG)"/><rect x="660" y="425" width="250" height="80" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="785" y="457" text-anchor="middle" class="small navy">s opp → u* opp</text><text x="785" y="485" text-anchor="middle" class="small navy">f opp → u* ned</text>${note(545,'Naturlig ledighet bestemmes av strømmen inn i og ut av ledighet.')}</svg>`}
function figPhillips(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Forventningsutvidet Phillipskurve','π = πᵉ + κỸ')}<line x1="150" y1="470" x2="850" y2="470" class="axis" marker-end="url(#aN)"/><line x1="150" y1="470" x2="150" y2="145" class="axis" marker-end="url(#aN)"/><path d="M260 395 L800 195" stroke="#2563eb" stroke-width="6"/><line x1="150" y1="395" x2="260" y2="395" stroke="#dc2626" stroke-width="3" stroke-dasharray="7 6"/><circle cx="260" cy="395" r="8" fill="#dc2626"/><text x="105" y="400" class="label red serif">πᵉ</text><text x="760" y="520" text-anchor="middle" class="label navy">Produksjonsgap (Ỹ)</text><text x="110" y="150" text-anchor="end" class="label navy">Inflasjon (π)</text><circle cx="650" cy="252" r="9" fill="#2563eb"/><line x1="650" y1="470" x2="650" y2="252" stroke="#2563eb" stroke-width="2" stroke-dasharray="7 6"/><text x="650" y="500" text-anchor="middle" class="small blue">positivt gap</text><rect x="575" y="330" width="300" height="80" rx="16" fill="#fff" stroke="#15803d" stroke-width="2"/><text x="725" y="363" text-anchor="middle" class="small navy">κ viser hvor sterkt π</text><text x="725" y="390" text-anchor="middle" class="small navy">reagerer på produksjonsgapet.</text>${note(545,'Faktisk inflasjon er forventet inflasjon pluss effekten av press i økonomien.')}</svg>`}
let active='all';
function render(){document.getElementById('tabs').innerHTML=['all',...figs.map(f=>f.id)].map(id=>`<button class="btn ${active===id?'active':''}" data-id="${id}">${id==='all'?'Alle':figs.find(f=>f.id===id).t}</button>`).join('');document.querySelectorAll('.btn').forEach(b=>b.onclick=()=>{active=b.dataset.id;render();});const show=active==='all'?figs:figs.filter(f=>f.id===active);document.getElementById('cards').innerHTML=show.map(f=>`<article class="card"><div class="cardHead"><div><h2>${f.t}</h2><p class="note">${f.n}</p></div><div class="formula">${f.f}</div></div><div class="stage fig">${f.svg()}</div></article>`).join('');}
render();
</script>
</body>
</html>
