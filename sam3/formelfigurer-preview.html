<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAM3 — Formelfigurer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9;color:#0f172a}.top{background:#0f172a;color:white;padding:34px 20px}.wrap{max-width:1040px;margin:auto}.badge{display:inline-block;background:rgba(220,38,38,.18);border:1px solid rgba(248,113,113,.35);color:#fecaca;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}h1{font-size:42px;letter-spacing:-1px;margin-bottom:8px}.top p{color:#cbd5e1;max-width:780px}.controls{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:16px;margin:-20px auto 18px;box-shadow:0 1px 3px rgba(15,23,42,.08)}.btns{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #e2e8f0;background:white;border-radius:999px;padding:9px 12px;font-weight:900;cursor:pointer}.btn.active,.btn:hover{background:#fef2f2;border-color:#fecaca;color:#991b1b}.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:18px;box-shadow:0 1px 3px rgba(15,23,42,.08);margin-bottom:18px}.cardHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.card h2{font-size:22px;letter-spacing:-.3px}.formula{font-family:Georgia,serif;font-size:24px;font-weight:900;background:#f8fafc;border:1px solid #e2e8f0;border-radius:13px;padding:8px 12px;white-space:nowrap}.stage{background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:10px}.stage svg{width:100%;height:auto;display:block;background:white;border-radius:16px;border:1px solid #e2e8f0;max-height:70vh}.note{font-size:13px;color:#64748b;margin-top:10px}.fig text{font-family:Inter,system-ui,sans-serif}.serif{font-family:Georgia,'Times New Roman',serif}.navy{fill:#0f172a}.muted{fill:#64748b}.red{fill:#dc2626}.blue{fill:#2563eb}.green{fill:#15803d}.orange{fill:#ea580c}.heavy{font-weight:900}.bold{font-weight:800}.axis{stroke:#0f172a;stroke-width:3}.guide{stroke:#334155;stroke-width:2;stroke-dasharray:6 6}.ft{font-family:Georgia,'Times New Roman',serif;font-size:38px;font-weight:900}.title{font-size:28px;font-weight:900}.label{font-size:19px;font-weight:900}.small{font-size:14px;font-weight:700}.footer{text-align:center;color:#94a3b8;font-size:12px;padding:30px}@media(max-width:640px){h1{font-size:31px}.cardHead{flex-direction:column}.formula{font-size:20px}.stage{padding:6px}}
</style>
</head>
<body>
<section class="top"><div class="wrap"><div class="badge">SAM3 · figurfix preview</div><h1>Rensede formelfigurer</h1><p>Dette er en kompakt preview av de korrigerte figurene. Målet er at alt skal være synlig i rammen, uten scrolling, uten overlapp og uten tilfeldige store piler som dekker innholdet.</p></div></section>
<main class="wrap"><section class="controls"><div class="btns" id="tabs"></div></section><section id="cards"></section></main><footer class="footer">StudieHub · SAM3 formelfigurer preview</footer>
<script>
const figs=[
{id:'bnp',t:'BNP etter utgiftsmetoden',f:'Y = C + I + G + NX',n:'BNP bygges opp som summen av etterspørselskomponentene.',svg:figBnp},
{id:'nx',t:'Nettoeksport',f:'NX = X − M',n:'Nettoeksport er eksport minus import.',svg:figNx},
{id:'sparing',t:'Nasjonal sparing',f:'S = Y − C − G',n:'Sparing er restleddet etter konsum og offentlige kjøp.',svg:figSparing},
{id:'s-i-nx',t:'Sparing, investering og nettoeksport',f:'S = I + NX',n:'I åpen økonomi går sparing til investering eller nettoeksport.',svg:figSIX},
{id:'cd',t:'Cobb–Douglas',f:'Y = A K^α L^(1−α)',n:'Produksjon kommer fra teknologi, kapital og arbeid.',svg:figCD},
{id:'per-worker',t:'Produksjon per arbeider',f:'y = A k^α',n:'Kurven viser avtakende grenseprodukt av kapital per arbeider.',svg:figPerWorker},
{id:'solow-dk',t:'Solow: kapitalakkumulasjon',f:'Δk = s f(k) − (δ+n)k',n:'Avstanden mellom kurvene viser endringen i kapital per arbeider.',svg:figSolowGap},
{id:'steady',t:'Solow: steady state',f:'s f(k*) = (δ+n)k*',n:'I steady state er Δk = 0.',svg:figSteady},
{id:'natural-u',t:'Naturlig ledighet',f:'u* = s/(s+f)',n:'Badekaret viser strømmen inn og ut av ledighet.',svg:figNaturalU},
{id:'phillips',t:'Forventningsutvidet Phillipskurve',f:'π = πᵉ + κỸ',n:'Produksjonsgapet påvirker inflasjonen rundt forventet inflasjon.',svg:figPhillips}
];
function defs(){return `<defs><marker id="aN" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#0f172a"/></marker><marker id="aG" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#16a34a"/></marker><marker id="aR" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#dc2626"/></marker><marker id="aB" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#2563eb"/></marker></defs>`}
function head(t,f){return `<text x="500" y="50" text-anchor="middle" class="title navy">${t}</text><text x="500" y="98" text-anchor="middle" class="ft navy">${f}</text>`}
function mathHead(t,formula){return `<text x="500" y="50" text-anchor="middle" class="title navy">${t}</text><text x="500" y="98" text-anchor="middle" class="ft navy">${formula}</text>`}
function note(y,txt){return `<rect x="70" y="${y}" width="860" height="56" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="500" y="${y+36}" text-anchor="middle" class="small navy">${txt}</text>`}
function bnpSmallBox(x,bg,st,title,sym,sub){return `<rect x="${x}" y="210" width="142" height="142" rx="18" fill="${bg}" stroke="${st}" stroke-width="3"/><text x="${x+71}" y="260" text-anchor="middle" class="small" fill="${st}">${title}</text><text x="${x+71}" y="303" text-anchor="middle" class="title" fill="${st}">${sym}</text><text x="${x+71}" y="333" text-anchor="middle" class="small navy">${sub}</text>`}
function op(x,s){return `<text x="${x}" y="294" text-anchor="middle" class="label navy">${s}</text>`}
function figBnp(){return `<svg viewBox="0 0 1000 620">${defs()}${head('BNP etter utgiftsmetoden','Y = C + I + G + NX')}<rect x="72" y="210" width="120" height="142" rx="18" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/><text x="132" y="286" text-anchor="middle" class="title navy">Y</text><text x="132" y="323" text-anchor="middle" class="small navy">BNP</text>${op(223,'=')}${bnpSmallBox(255,'#fef2f2','#dc2626','Konsum','C','husholdn.')}${op(425,'+')}${bnpSmallBox(455,'#eff6ff','#2563eb','Investering','I','bedrifter')}${op(625,'+')}${bnpSmallBox(655,'#f0fdf4','#15803d','Offentlig','G','stat/komm.')}${op(825,'+')}${bnpSmallBox(855,'#fff7ed','#ea580c','Nettoeksport','NX','X − M')}${note(470,'BNP fra utgiftssiden er summen av etterspørselen etter norsk produksjon.')}</svg>`}
function figNx(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Nettoeksport','NX = X − M')}<rect x="95" y="215" width="250" height="170" rx="22" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="220" y="307" text-anchor="middle" class="title blue">Norge</text><rect x="655" y="215" width="250" height="170" rx="22" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/><text x="780" y="307" text-anchor="middle" class="title green">Utlandet</text><line x1="355" y1="265" x2="640" y2="265" stroke="#16a34a" stroke-width="7" marker-end="url(#aG)"/><line x1="645" y1="335" x2="360" y2="335" stroke="#dc2626" stroke-width="7" marker-end="url(#aR)"/><text x="500" y="245" text-anchor="middle" class="label green">Eksport (X)</text><text x="500" y="380" text-anchor="middle" class="label red">Import (M)</text>${note(480,'Nettoeksport er eksport minus import. NX > 0 når eksporten er størst.')}</svg>`}
function figSparing(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Nasjonal sparing','S = Y − C − G')}<rect x="95" y="215" width="155" height="150" rx="20" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/><text x="172" y="282" text-anchor="middle" class="title navy">Y</text><text x="172" y="318" text-anchor="middle" class="small navy">inntekt</text><text x="285" y="304" text-anchor="middle" class="label navy">−</text><rect x="320" y="215" width="170" height="150" rx="20" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="405" y="282" text-anchor="middle" class="label red">Konsum</text><text x="405" y="318" text-anchor="middle" class="title red">C</text><text x="525" y="304" text-anchor="middle" class="label navy">−</text><rect x="560" y="215" width="170" height="150" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="645" y="282" text-anchor="middle" class="label blue">Offentlig</text><text x="645" y="318" text-anchor="middle" class="title blue">G</text><text x="765" y="304" text-anchor="middle" class="label navy">=</text><rect x="800" y="215" width="150" height="150" rx="20" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/><text x="875" y="282" text-anchor="middle" class="label green">Rest</text><text x="875" y="318" text-anchor="middle" class="title green">S</text><text x="500" y="405" text-anchor="middle" class="small navy">S er det som står igjen når C og G trekkes fra Y.</text>${note(480,'Nasjonal sparing er inntekt som ikke brukes til privat konsum eller offentlige kjøp.')}</svg>`}
function figSIX(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Sparing, investering og nettoeksport','S = I + NX')}<rect x="85" y="245" width="220" height="130" rx="20" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/><text x="195" y="320" text-anchor="middle" class="label green">Sparing (S)</text><text x="355" y="318" text-anchor="middle" class="label navy">=</text><rect x="410" y="190" width="250" height="105" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="535" y="253" text-anchor="middle" class="label blue">Investeringer (I)</text><rect x="410" y="335" width="250" height="105" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="535" y="398" text-anchor="middle" class="label orange">Nettoeksport (NX)</text><text x="705" y="318" text-anchor="middle" class="label navy">fordeles i</text><line x1="320" y1="305" x2="395" y2="245" stroke="#0f172a" stroke-width="4" marker-end="url(#aN)"/><line x1="320" y1="325" x2="395" y2="385" stroke="#0f172a" stroke-width="4" marker-end="url(#aN)"/><rect x="720" y="235" width="210" height="150" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="825" y="285" text-anchor="middle" class="small navy">Identitet:</text><text x="825" y="317" text-anchor="middle" class="small navy">sparing ender som</text><text x="825" y="348" text-anchor="middle" class="small navy">I eller NX.</text>${note(492,'I åpen økonomi kan sparing finansiere investeringer hjemme eller netto utlån til utlandet.')}</svg>`}
function cdFormula(){return `Y = A K<tspan baseline-shift="super" font-size="23">α</tspan> L<tspan baseline-shift="super" font-size="23">(1−α)</tspan>`}
function figCD(){return `<svg viewBox="0 0 1000 620">${defs()}${mathHead('Cobb–Douglas',cdFormula())}<rect x="95" y="165" width="250" height="75" rx="16" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/><text x="220" y="212" text-anchor="middle" class="label green">Teknologi (A)</text><rect x="95" y="270" width="250" height="75" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/><text x="220" y="318" text-anchor="middle" class="label red">Kapital (Kᵅ)</text><rect x="95" y="375" width="250" height="75" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><text x="220" y="423" text-anchor="middle" class="label blue">Arbeid (L¹⁻ᵅ)</text><rect x="455" y="250" width="195" height="125" rx="22" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/><text x="552" y="302" text-anchor="middle" class="label navy">Produksjons-</text><text x="552" y="332" text-anchor="middle" class="label navy">maskin</text><line x1="350" y1="203" x2="452" y2="278" stroke="#15803d" stroke-width="4" marker-end="url(#aG)"/><line x1="350" y1="308" x2="452" y2="310" stroke="#dc2626" stroke-width="4" marker-end="url(#aR)"/><line x1="350" y1="413" x2="452" y2="342" stroke="#2563eb" stroke-width="4" marker-end="url(#aB)"/><line x1="652" y1="313" x2="790" y2="313" stroke="#0f172a" stroke-width="5" marker-end="url(#aN)"/><rect x="805" y="258" width="115" height="110" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><text x="862" y="325" text-anchor="middle" class="title orange">Y</text><rect x="260" y="495" width="480" height="62" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="500" y="521" text-anchor="middle" class="small navy">α = kapitalens vekt</text><text x="500" y="546" text-anchor="middle" class="small navy">1−α = arbeidets vekt</text></svg>`}
function pwFormula(){return `y = A k<tspan baseline-shift="super" font-size="23">α</tspan>`}
function figPerWorker(){return `<svg viewBox="0 0 1000 620">${defs()}${mathHead('Produksjon per arbeider',pwFormula())}<line x1="160" y1="470" x2="850" y2="470" class="axis" marker-end="url(#aN)"/><line x1="160" y1="470" x2="160" y2="150" class="axis" marker-end="url(#aN)"/><path d="M160 470 C250 315 405 230 570 205 C680 190 765 185 825 185" fill="none" stroke="#2563eb" stroke-width="6"/><text x="640" y="175" class="label blue serif">y = A k<tspan baseline-shift="super" font-size="12">α</tspan></text><text x="500" y="545" text-anchor="middle" class="label navy">Kapital per arbeider (k)</text><text x="95" y="245" text-anchor="middle" class="label navy" transform="rotate(-90 95 245)">Produksjon per arbeider (y)</text><rect x="610" y="315" width="270" height="82" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="745" y="348" text-anchor="middle" class="small navy">Kurven flater ut:</text><text x="745" y="377" text-anchor="middle" class="small blue">avtakende grenseprodukt</text>${note(555,'Mer kapital per arbeider øker produksjonen per arbeider, men effekten avtar.')}</svg>`}
function solowBase(mode){let gap=`<line x1="420" y1="235" x2="420" y2="327" stroke="#2563eb" stroke-width="4"/><circle cx="420" cy="235" r="8" fill="#15803d"/><circle cx="420" cy="327" r="8" fill="#dc2626"/><text x="442" y="287" class="label blue serif">Δk</text>`;let steady=`<circle cx="680" cy="198" r="9" fill="#0f172a"/><line x1="680" y1="470" x2="680" y2="198" class="guide"/><text x="660" y="520" class="label navy serif">k*</text><text x="380" y="520" class="small green">Δk &gt; 0</text><text x="730" y="520" class="small red">Δk &lt; 0</text>`;let plus=mode==='steady'?gap:'';return `<line x1="130" y1="470" x2="870" y2="470" class="axis" marker-end="url(#aN)"/><line x1="130" y1="470" x2="130" y2="135" class="axis" marker-end="url(#aN)"/><path d="M130 470 C260 255 390 230 420 235 C530 198 620 198 680 198 C760 198 830 190 880 185" fill="none" stroke="#15803d" stroke-width="6"/><line x1="130" y1="470" x2="880" y2="100" stroke="#dc2626" stroke-width="5"/><text x="740" y="185" class="label green serif">s f(k)</text><text x="745" y="132" class="label red serif">(δ+n)k</text><text x="515" y="545" text-anchor="middle" class="label navy">Kapital per arbeider (k)</text><text x="72" y="270" text-anchor="middle" class="label navy" transform="rotate(-90 72 270)">Investering / break-even</text><line x1="420" y1="470" x2="420" y2="235" class="guide"/>${mode==='gap'?gap:`${plus}${steady}`}`}
function solowFormula(){return `Δk = s f(k) − (δ+n)k`}
function figSolowGap(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Solow: kapitalakkumulasjon',solowFormula())}${solowBase('gap')}<rect x="690" y="330" width="230" height="88" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="805" y="362" text-anchor="middle" class="small navy">Når s f(k) &gt;</text><text x="805" y="389" text-anchor="middle" class="small red">(δ+n)k</text><text x="805" y="414" text-anchor="middle" class="small navy">øker k.</text>${note(555,'Kapital per arbeider øker når investeringene er større enn break-even-investeringen.')}</svg>`}
function figSteady(){return `<svg viewBox="0 0 1000 620">${defs()}${head('Solow: steady state','s f(k*) = (δ+n)k*')}${solowBase('steady')}${note(555,'I steady state er investering akkurat lik det som trengs for å holde k konstant.')}</svg>`}
function naturalFormula(){return `u* = <tspan class="red">s</tspan> / (<tspan class="red">s</tspan> + <tspan class="green">f</tspan>)`}
function figNaturalU(){return `<svg viewBox="0 0 1000 620">${defs()}${mathHead('Naturlig ledighet',naturalFormula())}<rect x="100" y="185" width="230" height="90" rx="18" fill="#fff" stroke="#dc2626" stroke-width="3"/><text x="215" y="222" text-anchor="middle" class="label red">Separasjoner (s)</text><text x="215" y="252" text-anchor="middle" class="small navy">inn i ledighet</text><rect x="670" y="185" width="230" height="90" rx="18" fill="#fff" stroke="#15803d" stroke-width="3"/><text x="785" y="222" text-anchor="middle" class="label green">Jobbfinning (f)</text><text x="785" y="252" text-anchor="middle" class="small navy">ut av ledighet</text><path d="M355 330 C395 300 605 300 645 330 L615 440 C570 468 430 468 385 440 Z" fill="#eff6ff" stroke="#0f172a" stroke-width="4"/><path d="M395 386 C455 370 545 370 605 386 L590 428 C535 445 465 445 410 428 Z" fill="#bfdbfe"/><text x="500" y="414" text-anchor="middle" class="title navy">Ledighet (u*)</text><path d="M300 275 C350 305 365 318 386 342" fill="none" stroke="#dc2626" stroke-width="5" marker-end="url(#aR)"/><path d="M616 384 C660 370 685 338 718 280" fill="none" stroke="#16a34a" stroke-width="5" marker-end="url(#aG)"/><rect x="660" y="425" width="250" height="80" rx="16" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="785" y="457" text-anchor="middle" class="small navy">s opp → u* opp</text><text x="785" y="485" text-anchor="middle" class="small navy">f opp → u* ned</text>${note(545,'Naturlig ledighet bestemmes av strømmen inn i og ut av ledighet.')}</svg>`}
function phFormula(){return `π = π<tspan baseline-shift="super" font-size="23">e</tspan> + κỸ`}
function figPhillips(){return `<svg viewBox="0 0 1000 620">${defs()}${mathHead('Forventningsutvidet Phillipskurve',phFormula())}<line x1="150" y1="470" x2="850" y2="470" class="axis" marker-end="url(#aN)"/><line x1="150" y1="470" x2="150" y2="145" class="axis" marker-end="url(#aN)"/><path d="M260 395 L800 195" stroke="#2563eb" stroke-width="6"/><line x1="150" y1="395" x2="260" y2="395" stroke="#dc2626" stroke-width="3" stroke-dasharray="7 6"/><line x1="260" y1="470" x2="260" y2="395" stroke="#dc2626" stroke-width="2" stroke-dasharray="7 6"/><circle cx="260" cy="395" r="8" fill="#dc2626"/><text x="105" y="400" class="label red serif">πᵉ</text><text x="760" y="520" text-anchor="middle" class="label navy">Produksjonsgap (Ỹ)</text><text x="110" y="150" text-anchor="end" class="label navy">Inflasjon (π)</text><circle cx="650" cy="252" r="9" fill="#2563eb"/><line x1="650" y1="470" x2="650" y2="252" stroke="#2563eb" stroke-width="2" stroke-dasharray="7 6"/><line x1="150" y1="252" x2="650" y2="252" stroke="#2563eb" stroke-width="2" stroke-dasharray="7 6"/><text x="650" y="500" text-anchor="middle" class="small blue">positivt gap</text><rect x="575" y="330" width="300" height="80" rx="16" fill="#fff" stroke="#15803d" stroke-width="2"/><text x="725" y="363" text-anchor="middle" class="small navy">κ viser hvor sterkt π</text><text x="725" y="390" text-anchor="middle" class="small navy">reagerer på produksjonsgapet.</text>${note(545,'Faktisk inflasjon er forventet inflasjon pluss effekten av press i økonomien.')}</svg>`}
let active='all';
function render(){document.getElementById('tabs').innerHTML=['all',...figs.map(f=>f.id)].map(id=>`<button class="btn ${active===id?'active':''}" data-id="${id}">${id==='all'?'Alle':figs.find(f=>f.id===id).t}</button>`).join('');document.querySelectorAll('.btn').forEach(b=>b.onclick=()=>{active=b.dataset.id;render();});const show=active==='all'?figs:figs.filter(f=>f.id===active);document.getElementById('cards').innerHTML=show.map(f=>`<article class="card"><div class="cardHead"><div><h2>${f.t}</h2><p class="note">${f.n}</p></div><div class="formula">${f.f}</div></div><div class="stage fig">${f.svg()}</div></article>`).join('');}
render();
</script>
</body>
</html>
