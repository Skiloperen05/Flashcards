<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SAM3 Solow og Phillips fix</title><style>body{margin:0;background:#f1f5f9;color:#0f172a;font-family:Arial,sans-serif}.wrap{max-width:1040px;margin:auto;padding:24px}h1{font-size:34px}.card{background:white;border:1px solid #dbe4f0;border-radius:22px;margin:18px 0;padding:18px}.stage{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:10px}.stage svg{width:100%;height:auto;display:block;background:white;border-radius:14px}.title{font-size:28px;font-weight:900}.formula{font-family:Georgia,serif;font-size:40px;font-weight:900}.label{font-size:22px;font-weight:900}.small{font-size:15px;font-weight:700}.axis{stroke:#0f172a;stroke-width:3}.guide{stroke:#334155;stroke-width:2;stroke-dasharray:7 7}.green{fill:#15803d}.red{fill:#dc2626}.blue{fill:#2563eb}.navy{fill:#0f172a}</style></head><body><main class="wrap"><h1>Korrigerte figurer: Solow og Phillips</h1><p>Her er de tre figurene som måtte rettes. Solow-kurven er nå tegnet som en jevn, stigende og konkav kurve. Punktene er lagt på kurven/linjen, ikke omvendt.</p><div id="app"></div></main><script>
const N='#0f172a',G='#15803d',R='#dc2626',B='#2563eb';
function greenY(x){const u=(x-130)/750;return 470-330*(1-Math.exp(-3.2*u))/(1-Math.exp(-3.2));}
function redY(x){return 470-.37*(x-130);}
function greenPath(){let p=[];for(let x=130;x<=880;x+=10)p.push(x.toFixed(1)+','+greenY(x).toFixed(1));return p.join(' ');}
function defs(id){return `<defs><marker id="a${id}" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="${N}"/></marker></defs>`;}
function note(y,t){return `<rect x="70" y="${y}" width="860" height="48" rx="15" fill="#fff" stroke="${B}" stroke-width="2"/><text x="500" y="${y+30}" text-anchor="middle" class="small navy">${t}</text>`;}
function solow(kind){const x=340,yg=greenY(x),yr=redY(x),xs=656,ys=greenY(xs);const title=kind==='steady'?'Solow: steady state':'Solow: kapitalakkumulasjon';const form=kind==='steady'?'s f(k*) = (δ+n)k*':'Δk = s f(k) − (δ+n)k';const extra=kind==='steady'?`<circle cx="${xs}" cy="${ys}" r="9" fill="${N}"/><line x1="${xs}" y1="470" x2="${xs}" y2="${ys}" class="guide"/><text x="${xs-18}" y="522" class="label navy">k*</text><text x="305" y="522" class="small green">Δk &gt; 0</text><text x="720" y="522" class="small red">Δk &lt; 0</text>`:`<rect x="690" y="330" width="230" height="88" rx="16" fill="#fff" stroke="${B}" stroke-width="2"/><text x="805" y="362" text-anchor="middle" class="small navy">Når s f(k) &gt;</text><text x="805" y="389" text-anchor="middle" class="small red">(δ+n)k</text><text x="805" y="414" text-anchor="middle" class="small navy">øker k.</text>`;return `<svg viewBox="0 0 1000 620">${defs(kind)}<text x="500" y="50" text-anchor="middle" class="title navy">${title}</text><text x="500" y="98" text-anchor="middle" class="formula navy">${form}</text><line x1="130" y1="470" x2="870" y2="470" class="axis" marker-end="url(#a${kind})"/><line x1="130" y1="470" x2="130" y2="135" class="axis" marker-end="url(#a${kind})"/><polyline points="${greenPath()}" fill="none" stroke="${G}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="130" y1="470" x2="880" y2="${redY(880)}" stroke="${R}" stroke-width="5"/><text x="735" y="${greenY(735)-22}" class="label green">s f(k)</text><text x="738" y="${redY(738)-18}" class="label red">(δ+n)k</text><text x="515" y="545" text-anchor="middle" class="label navy">Kapital per arbeider (k)</text><text x="72" y="270" text-anchor="middle" class="label navy" transform="rotate(-90 72 270)">Investering / break-even</text><line x1="${x}" y1="470" x2="${x}" y2="${yg}" class="guide"/><line x1="${x}" y1="${yg}" x2="${x}" y2="${yr}" stroke="${B}" stroke-width="4"/><circle cx="${x}" cy="${yg}" r="8" fill="${G}"/><circle cx="${x}" cy="${yr}" r="8" fill="${R}"/><text x="${x+24}" y="${(yg+yr)/2+5}" class="label blue">Δk</text>${extra}${note(555,kind==='steady'?'I steady state er investering akkurat lik det som trengs for å holde k konstant.':'Kapital per arbeider øker når investeringene er større enn break-even-investeringen.')}</svg>`;}
function phillips(){return `<svg viewBox="0 0 1000 620">${defs('p')}<text x="500" y="50" text-anchor="middle" class="title navy">Forventningsutvidet Phillipskurve</text><text x="500" y="98" text-anchor="middle" class="formula navy">π = πᵉ + κỸ</text><line x1="150" y1="470" x2="850" y2="470" class="axis" marker-end="url(#ap)"/><line x1="150" y1="470" x2="150" y2="145" class="axis" marker-end="url(#ap)"/><path d="M260 395 L800 195" stroke="${B}" stroke-width="6"/><rect x="575" y="180" width="235" height="48" rx="14" fill="#fff" stroke="${B}" stroke-width="2"/><text x="692" y="212" text-anchor="middle" class="label blue">π = πᵉ + κỸ</text><line x1="150" y1="395" x2="260" y2="395" stroke="${R}" stroke-width="3" stroke-dasharray="7 6"/><line x1="260" y1="470" x2="260" y2="395" stroke="${R}" stroke-width="2" stroke-dasharray="7 6"/><circle cx="260" cy="395" r="8" fill="${R}"/><text x="105" y="400" class="label red">πᵉ</text><text x="760" y="520" text-anchor="middle" class="label navy">Produksjonsgap (Ỹ)</text><text x="110" y="150" text-anchor="end" class="label navy">Inflasjon (π)</text><circle cx="650" cy="252" r="9" fill="${B}"/><line x1="650" y1="470" x2="650" y2="252" stroke="${B}" stroke-width="2" stroke-dasharray="7 6"/><line x1="150" y1="252" x2="650" y2="252" stroke="${B}" stroke-width="2" stroke-dasharray="7 6"/><text x="650" y="500" text-anchor="middle" class="small blue">positivt gap</text><rect x="575" y="330" width="300" height="80" rx="16" fill="#fff" stroke="${G}" stroke-width="2"/><text x="725" y="363" text-anchor="middle" class="small navy">κ viser hvor sterkt π</text><text x="725" y="390" text-anchor="middle" class="small navy">reagerer på produksjonsgapet.</text>${note(545,'Faktisk inflasjon er forventet inflasjon pluss effekten av press i økonomien.')}</svg>`;}
app.innerHTML='<section class="card"><h2>Solow: kapitalakkumulasjon</h2><div class="stage">'+solow('gap')+'</div></section><section class="card"><h2>Solow: steady state</h2><div class="stage">'+solow('steady')+'</div></section><section class="card"><h2>Phillips</h2><div class="stage">'+phillips()+'</div></section>';
</script></body></html>
