<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f1f5f9;--surface:#fff;--header:#0f172a;--accent:#059669;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--good:#16a34a;--mid:#d97706;--bad:#dc2626;--shadow:0 10px 30px rgba(15,23,42,.08)}body{font-family:'Lora',Georgia,'Times New Roman',serif;background:var(--bg);color:var(--text);min-height:100vh}.top{background:var(--header);color:#fff;padding:18px 20px 42px}.nav{max-width:820px;margin:0 auto 30px;display:flex;justify-content:space-between;align-items:center;gap:12px}.nav a{color:#cbd5e1;text-decoration:none;font-size:13px;font-weight:700}.hero{max-width:820px;margin:0 auto}.eyebrow{display:inline-flex;gap:8px;align-items:center;background:rgba(5,150,105,.18);border:1px solid rgba(5,150,105,.35);color:#6ee7b7;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}.dot{width:7px;height:7px;background:var(--accent);border-radius:50%}h1{font-size:clamp(26px,5vw,40px);letter-spacing:-.8px;margin-bottom:8px}.sub{color:#94a3b8;font-size:15px;max-width:620px;line-height:1.6}.wrap{max-width:820px;margin:-24px auto 60px;padding:0 18px}.panel{background:var(--surface);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:18px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{border:1.5px solid var(--border);background:#fff;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer}.chip.active{background:#ecfdf5;border-color:#86efac;color:#166534}.count{font-size:12px;font-weight:800;color:var(--muted)}.progress{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-bottom:18px}.bar{height:100%;width:0;background:var(--accent);transition:width .25s}.card{min-height:330px;border:1px solid var(--border);border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:28px;cursor:pointer;background:linear-gradient(180deg,#fff,#f8fafc)}.tag{font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}.label{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;background:#eef2ff;color:#2563eb;border-radius:8px;padding:5px 9px;margin-bottom:16px}.front{font-size:24px;font-weight:800;line-height:1.25}.back{font-size:16px;line-height:1.65;text-align:left;max-width:680px}.back b{color:#064e3b}.hint{font-size:12px;color:var(--muted);margin-top:18px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border:none;border-radius:14px;padding:13px 16px;font-weight:900;cursor:pointer;font-family:inherit}.btn.secondary{background:#f8fafc;color:#475569;border:1px solid var(--border)}.btn.primary{background:var(--accent);color:#fff}.rating{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.rate{border-radius:12px;padding:11px 8px;font-size:12px;font-weight:900;border:2px solid;cursor:pointer;background:#fff}.bad{color:var(--bad);border-color:#fecaca}.mid{color:var(--mid);border-color:#fde68a}.good{color:var(--good);border-color:#bbf7d0}.list{margin-top:18px;display:grid;gap:8px}.row{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 14px;font-size:13px;display:flex;justify-content:space-between;gap:12px}.row span:first-child{font-weight:800}.row span:last-child{color:var(--muted);font-weight:700}@media(max-width:560px){.actions,.rating{grid-template-columns:1fr}.card{min-height:360px;padding:22px}.front{font-size:21px}.back{font-size:15px}}

<body>
<header class="top"><nav class="nav"><a href="./">← SOL 1</a><a href="../flashcards/?subject=subj_sol1">Alle SOL1-flashcards</a></nav><section class="hero"><div class="eyebrow"><span class="dot"></span>SOL 1 flashcarddekk</div><h1>Teorier, modeller og begreper</h1><p class="sub">Forklaringskort for sentrale teorier, teoretiske rammeverk, modeller og eksamensbegreper i organisasjonsatferd.</p></section></header>
<main class="wrap"><section class="panel"><div class="toolbar"><div class="chips"><button class="chip active" data-filter="Alle">Alle</button><button class="chip" data-filter="Teori">Teorier</button><button class="chip" data-filter="Modell">Modeller</button><button class="chip" data-filter="Begrep">Begreper</button></div><div class="count" id="counter"></div></div><div class="progress"><div class="bar" id="bar"></div></div><div class="card" id="card" title="Klikk for å snu kortet"><div class="tag" id="tag"></div><div class="label" id="label"></div><div class="front" id="front"></div><div class="back" id="back" style="display:none"></div><div class="hint" id="hint"></div></div><div class="actions"><button class="btn secondary" id="prev">← Forrige</button><button class="btn primary" id="next">Neste →</button></div><div class="rating"><button class="rate bad">Kunne ikke</button><button class="rate mid">Halvveis</button><button class="rate good">Kunne det</button></div><div class="list" id="overview"></div></section></main>
<script>
const cards=[
{cat:'Teori',q:'Forklar selvbestemmelsesteorien.',a:'<b>Kjerne:</b> Motivasjon blir sterkere og mer varig når tre psykologiske behov dekkes: autonomi, kompetanse og tilhørighet. <b>Eksamen:</b> Bruk teorien til å forklare indre motivasjon, trivsel og prestasjon. <b>Eksempel:</b> En ansatt får frihet i metodevalg, mestrer oppgaven og føler seg inkludert i teamet.'},
{cat:'Teori',q:'Forklar forventningsteori.',a:'<b>Kjerne:</b> Motivasjon avhenger av om personen tror innsats gir prestasjon, prestasjon gir belønning, og belønningen er verdifull. Ofte uttrykt som forventning × instrumentality × valens. <b>Eksamen:</b> Lav motivasjon kan skyldes brudd i ett av leddene. <b>Eksempel:</b> Bonus motiverer lite hvis ansatte ikke tror innsatsen faktisk påvirker bonusen.'},
{cat:'Teori',q:'Forklar sosial identitetsteori.',a:'<b>Kjerne:</b> Mennesker definerer deler av seg selv gjennom gruppetilhørighet, som kan skape inngrupper, utgrupper og favorisering av egen gruppe. <b>Eksamen:</b> Brukes til å forklare samarbeid, konflikt, kultur og organisasjonstilhørighet. <b>Eksempel:</b> Avdelinger konkurrerer fordi de identifiserer seg mer med egen enhet enn med hele organisasjonen.'},
{cat:'Teori',q:'Forklar attribusjonsteori.',a:'<b>Kjerne:</b> Handler om hvordan vi forklarer andres og egen atferd, enten med interne årsaker som personlighet/evne eller eksterne årsaker som situasjon/rammer. <b>Eksamen:</b> Knytt til vurderingsfeil, ledelse og konflikter. <b>Eksempel:</b> En leder tolker sen levering som lav innsats, selv om årsaken egentlig var uklare instrukser.'},
{cat:'Teori',q:'Forklar transformasjonsledelse.',a:'<b>Kjerne:</b> Ledelse som inspirerer, utvikler og endrer medarbeidere gjennom visjon, idealisert innflytelse, individuell omtanke og intellektuell stimulering. <b>Eksamen:</b> Passer ved endring, engasjement og høyere mål enn kortsiktig belønning. <b>Eksempel:</b> En leder får teamet til å se meningen med en omstilling og bidra aktivt.'},
{cat:'Teori',q:'Forklar transaksjonsledelse.',a:'<b>Kjerne:</b> Ledelse basert på bytteforhold: klare mål, belønning ved ønsket prestasjon og korrigering ved avvik. <b>Eksamen:</b> Kontraster mot transformasjonsledelse. <b>Eksempel:</b> Selgere får bonus for måloppnåelse og tett oppfølging ved avvik.'},
{cat:'Teori',q:'Forklar begrenset rasjonalitet.',a:'<b>Kjerne:</b> Beslutningstakere prøver å være rasjonelle, men begrenses av tid, informasjon, kognitiv kapasitet og usikkerhet. Derfor velger man ofte tilfredsstillende løsninger heller enn optimale. <b>Eksamen:</b> Brukes til å forklare hvorfor reelle beslutninger avviker fra idealmodeller.'},
{cat:'Teori',q:'Forklar to-prosess-teori / System 1 og System 2.',a:'<b>Kjerne:</b> System 1 er raskt, intuitivt og automatisk. System 2 er tregere, analytisk og krevende. <b>Eksamen:</b> Brukes til å forklare heuristikker, bias og beslutningsfeller. <b>Eksempel:</b> Førsteinntrykk av en kandidat er System 1; strukturert vurdering av kompetanse er System 2.'},
{cat:'Teori',q:'Forklar Maslows behovshierarki.',a:'<b>Kjerne:</b> Menneskelige behov kan forstås som et hierarki fra fysiologiske behov og trygghet til sosiale behov, anerkjennelse og selvrealisering. <b>Eksamen:</b> Brukes som klassisk motivasjonsteori, men bør gjerne nyanseres: behov opptrer ikke alltid strengt trinnvis.'},
{cat:'Teori',q:'Forklar selvoppfyllende profeti.',a:'<b>Kjerne:</b> Forventninger til en person kan påvirke hvordan vi behandler personen, som igjen gjør at personen begynner å opptre i tråd med forventningen. <b>Eksamen:</b> Knytt til ledelse, prestasjon og Pygmalion-effekten. <b>Eksempel:</b> En leder som tror en ansatt er talentfull gir mer støtte, og den ansatte presterer bedre.'},
{cat:'Teori',q:'Forklar Lewins endringsteori / kraftfeltteori.',a:'<b>Kjerne:</b> Endring påvirkes av drivkrefter som presser for endring og motkrefter som holder organisasjonen tilbake. Endring lykkes ved å styrke drivkrefter eller redusere motkrefter. <b>Eksamen:</b> Brukes til å analysere motstand, støtte og endringsstrategi.'},
{cat:'Modell',q:'Forklar MARS-modellen.',a:'<b>Kjerne:</b> Atferd og prestasjon påvirkes av motivasjon, evner/ability, rolleforståelse og situasjonsfaktorer. <b>Eksamen:</b> God analysemodell for hvorfor en ansatt ikke presterer. <b>Eksempel:</b> Lav prestasjon kan skyldes uklare roller selv om motivasjonen er høy.'},
{cat:'Modell',q:'Forklar jobbkrav-kontroll-modellen.',a:'<b>Kjerne:</b> Belastning og læring avhenger av kombinasjonen mellom jobbkrav og kontroll/autonomi. Høye krav med lav kontroll gir stress. Høye krav med høy kontroll kan gi aktiv læring. <b>Eksamen:</b> Bruk modellen til å analysere stress, trivsel og arbeidsdesign.'},
{cat:'Modell',q:'Forklar selvkonsept-modellen.',a:'<b>Kjerne:</b> Selvkonsept handler om hvordan vi oppfatter oss selv, inkludert selvbilde, selvfølelse, mestringstro og sosial identitet. <b>Eksamen:</b> Forklar hvordan identitet og selvvurdering påvirker motivasjon, valg og reaksjoner på tilbakemeldinger.'},
{cat:'Modell',q:'Forklar Lewins trestegsmodell.',a:'<b>Kjerne:</b> Endring skjer gjennom opptining, endring og nedfrysing. Først skapes beredskap for endring, deretter innføres ny praksis, og til slutt stabiliseres den nye atferden. <b>Eksamen:</b> Passer til å strukturere endringsprosesser.'},
{cat:'Modell',q:'Forklar rasjonell beslutningsmodell.',a:'<b>Kjerne:</b> En idealmodell der man definerer problem, identifiserer alternativer, vurderer konsekvenser, velger beste løsning og evaluerer resultat. <b>Eksamen:</b> Kontraster med begrenset rasjonalitet og beslutningsfeller.'},
{cat:'Modell',q:'Forklar team effectiveness-modeller / teamdynamikkmodeller.',a:'<b>Kjerne:</b> Slike modeller forklarer teameffektivitet gjennom input, prosesser/mediatorer og output. Viktige faktorer er mål, roller, normer, tillit, kommunikasjon, konflikt og psykologisk trygghet. <b>Eksamen:</b> Bruk til å analysere hvorfor et team fungerer eller ikke.'},
{cat:'Begrep',q:'Forklar gruppetenkning.',a:'<b>Kjerne:</b> Gruppemedlemmer søker enighet så sterkt at kritisk vurdering, motforestillinger og realistisk alternativvurdering svekkes. <b>Eksamen:</b> Knytt til beslutningskvalitet. <b>Tegn:</b> selvsensur, illusjon om enstemmighet, press mot avvikere og undervurdering av risiko.'},
{cat:'Begrep',q:'Forklar sosial loffing.',a:'<b>Kjerne:</b> Individers innsats reduseres når de jobber i gruppe og eget bidrag er mindre synlig. <b>Eksamen:</b> Løsninger er tydelige individuelle bidrag, ansvarliggjøring, meningsfulle oppgaver og mindre team. <b>Eksempel:</b> Noen bidrar lite i gruppearbeid fordi andre dekker opp.'},
{cat:'Begrep',q:'Forklar psykologisk trygghet.',a:'<b>Kjerne:</b> Opplevelsen av at man kan si fra, stille spørsmål, innrømme feil og komme med ideer uten å bli straffet eller ydmyket. <b>Eksamen:</b> Viktig for læring, innovasjon og teamkvalitet. <b>Ikke det samme som:</b> alltid enighet eller lav standard.'},
{cat:'Begrep',q:'Forklar tillit.',a:'<b>Kjerne:</b> Villighet til å være sårbar overfor andre basert på forventning om kompetanse, integritet og velvilje. <b>Eksamen:</b> Tillit reduserer kontrollbehov, øker samarbeid og gjør kommunikasjon mer effektiv. <b>Eksempel:</b> Man deler usikkerhet fordi man tror teamet vil hjelpe.'},
{cat:'Begrep',q:'Forklar beslutningsfeller.',a:'<b>Kjerne:</b> Systematiske feil i vurdering og beslutning som gjør at vi avviker fra gode beslutningsprosesser. <b>Eksamen:</b> Eksempler er ankerfellen, bekreftelsesfellen, tilgjengelighetsheuristikk og overkonfidens. <b>Tiltak:</b> struktur, data, motargumenter og flere vurderere.'},
{cat:'Begrep',q:'Forklar heuristikker.',a:'<b>Kjerne:</b> Mentale tommelfingerregler som forenkler beslutninger. De sparer tid, men kan gi skjevheter når situasjonen krever grundigere analyse. <b>Eksamen:</b> Knytt heuristikker til System 1. <b>Eksempel:</b> Å vurdere sannsynlighet ut fra det som er lettest å huske.'},
{cat:'Begrep',q:'Forklar overkonfidens.',a:'<b>Kjerne:</b> Tendens til å overvurdere egne kunnskaper, vurderinger eller kontroll over utfallet. <b>Eksamen:</b> Kan gi dårlig risikovurdering, for raske beslutninger og lite læring. <b>Tiltak:</b> kalibrering, sannsynlighetsvurdering og aktiv søking etter motbevis.'},
{cat:'Begrep',q:'Forklar bekreftelsesfellen.',a:'<b>Kjerne:</b> Tendens til å søke, tolke og huske informasjon som bekrefter det vi allerede tror, og nedtone informasjon som utfordrer oss. <b>Eksamen:</b> Relevant i rekruttering, strategi og konflikter. <b>Tiltak:</b> bevisst lete etter motargumenter og bruke strukturerte kriterier.'},
{cat:'Begrep',q:'Forklar ankerfellen.',a:'<b>Kjerne:</b> Første tall, inntrykk eller informasjon fungerer som et anker som påvirker senere vurderinger for mye. <b>Eksamen:</b> Typisk i lønn, pris, prognoser og intervjuer. <b>Tiltak:</b> vurder uavhengig før diskusjon og bruk flere referansepunkter.'},
{cat:'Begrep',q:'Forklar tilgjengelighetsheuristikk.',a:'<b>Kjerne:</b> Vi vurderer sannsynlighet eller viktighet ut fra hvor lett eksempler dukker opp i hukommelsen. <b>Eksamen:</b> Kan gi feil risikovurdering etter nylige eller dramatiske hendelser. <b>Eksempel:</b> En leder overvurderer sykefraværsproblemet etter én svært synlig sak.'},
{cat:'Begrep',q:'Forklar strukturert intervju.',a:'<b>Kjerne:</b> Intervjuform der alle kandidater får samme jobbrelevante spørsmål, vurderes etter forhåndsdefinerte kriterier og scores systematisk. <b>Eksamen:</b> Øker reliabilitet og validitet, og reduserer bias sammenlignet med ustrukturert intervju.'},
{cat:'Begrep',q:'Forklar jobbanalyse.',a:'<b>Kjerne:</b> Systematisk kartlegging av arbeidsoppgaver, ansvar, kontekst og krav til kunnskap, ferdigheter, evner og egenskaper. <b>Eksamen:</b> Grunnlag for rekruttering, seleksjon, opplæring og prestasjonsvurdering. <b>Eksempel:</b> Før intervju defineres hvilke kompetanser jobben faktisk krever.'},
{cat:'Begrep',q:'Forklar teamkontrakt.',a:'<b>Kjerne:</b> En avtale i teamet om mål, roller, normer, kommunikasjonsregler, møteform, beslutningsregler og håndtering av konflikt. <b>Eksamen:</b> Forebygger koordinasjonsproblemer og sosial loffing. <b>Eksempel:</b> Teamet avtaler frister, kvalitet og hva som skjer ved manglende bidrag.'}
];
let filtered=[...cards],i=0,flipped=false;const $=id=>document.getElementById(id);function render(){const c=filtered[i];$('tag').textContent=c.cat;$('label').textContent=flipped?'Svar':'Spørsmål';$('front').style.display=flipped?'none':'block';$('back').style.display=flipped?'block':'none';$('front').textContent=c.q;$('back').innerHTML=c.a;$('hint').textContent=flipped?'Klikk for å se spørsmålet igjen':'Klikk for å se forklaring';$('counter').textContent=(i+1)+' / '+filtered.length;$('bar').style.width=((i+1)/filtered.length*100)+'%';renderOverview()}function renderOverview(){$('overview').innerHTML=filtered.map((c,idx)=>'<div class="row"><span>'+(idx+1)+'. '+c.q.replace('Forklar ','')+'</span><span>'+c.cat+'</span></div>').join('')}function setFilter(f){filtered=f==='Alle'?[...cards]:cards.filter(c=>c.cat===f);i=0;flipped=false;document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));render()}$('card').onclick=()=>{flipped=!flipped;render()};$('next').onclick=()=>{i=(i+1)%filtered.length;flipped=false;render()};$('prev').onclick=()=>{i=(i-1+filtered.length)%filtered.length;flipped=false;render()};document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>setFilter(b.dataset.filter));document.querySelectorAll('.rate').forEach(b=>b.onclick=()=>{i=(i+1)%filtered.length;flipped=false;render()});document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')$('next').click();if(e.key==='ArrowLeft')$('prev').click();if(e.key===' ') {e.preventDefault();$('card').click();}});render();
</script>
