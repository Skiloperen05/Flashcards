<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SOL 1 — Flashcards 2.0 komplett</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>AuthGuard.requireAuth().then(s=>{if(!s)return;AuthGuard.bindUserInfo&&AuthGuard.bindUserInfo('userEmailLabel','userChip','userAvatar');});</script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f1f5f9;color:#0f172a}.top{background:#0f172a;color:white;padding:18px 20px 46px}.nav,.hero,.wrap{max-width:980px;margin:auto}.nav{display:flex;justify-content:space-between;margin-bottom:28px}.nav a{color:#cbd5e1;text-decoration:none;font-size:13px;font-weight:800}.badge{display:inline-flex;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.35);color:#c4b5fd;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px}h1{font-size:clamp(27px,5vw,42px);margin:14px 0 8px;letter-spacing:-.8px}.sub{color:#94a3b8;max-width:680px}.wrap{margin-top:-28px;padding:0 18px 60px}.panel{background:white;border:1px solid #e2e8f0;border-radius:22px;box-shadow:0 10px 30px rgba(15,23,42,.08);padding:22px}.toolbar{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}.stats{display:flex;gap:8px;flex-wrap:wrap}.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:#64748b}.stat b{color:#0f172a}.search{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;min-width:230px}.search input{border:0;outline:0;background:transparent;font:inherit;font-size:13px;width:190px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:14px}.deck{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:17px;text-align:left;cursor:pointer;font:inherit;color:inherit;display:flex;flex-direction:column;gap:8px}.deck:hover{border-color:#c4b5fd;box-shadow:0 10px 30px rgba(15,23,42,.08);transform:translateY(-2px)}.deck-head{display:flex;justify-content:space-between;gap:8px}.num{font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#7c3aed}.pill{font-size:10px;font-weight:900;text-transform:uppercase;padding:3px 8px;border-radius:999px;background:#ede9fe;color:#5b21b6}.title{font-weight:800;line-height:1.35}.desc{font-size:12.5px;color:#64748b;line-height:1.5;flex:1}.foot{display:flex;justify-content:space-between;font-size:12px;color:#64748b;font-weight:800}.status-msg{padding:22px;text-align:center;color:#64748b;font-weight:700}.status-msg.error{color:#dc2626}.study{display:none}.study.active{display:block}.hidden{display:none}.study-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.back-btn,.btn{font:inherit;font-weight:900;border-radius:12px;cursor:pointer}.back-btn{border:1px solid #e2e8f0;background:#f8fafc;padding:8px 12px}.count{font-size:12px;font-weight:800;color:#64748b}.progress{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:16px 0}.bar{height:100%;width:0;background:#7c3aed}.card{min-height:335px;border:1px solid #e2e8f0;border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:28px;background:linear-gradient(180deg,#fff,#f8fafc);cursor:pointer}.tag{font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#7c3aed;margin-bottom:12px}.label{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;background:#ede9fe;color:#5b21b6;border-radius:8px;padding:5px 9px;margin-bottom:16px}.front{font-size:23px;font-weight:800;line-height:1.3}.back{font-size:16px;line-height:1.65;text-align:left;max-width:730px}.back b{color:#5b21b6}.hint{font-size:12px;color:#64748b;margin-top:18px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border:0;padding:13px 16px}.secondary{background:#f8fafc;color:#475569;border:1px solid #e2e8f0}.primary{background:#7c3aed;color:#fff}.rating{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.rate{border-radius:12px;padding:11px 8px;font-size:12px;font-weight:900;border:2px solid;cursor:pointer;background:#fff}.bad{color:#dc2626;border-color:#fecaca}.mid{color:#d97706;border-color:#fde68a}.good{color:#16a34a;border-color:#bbf7d0}@media(max-width:560px){.actions,.rating{grid-template-columns:1fr}.front{font-size:20px}.back{font-size:15px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><nav class="nav"><a href="./">← SOL 1</a><a href="../flashcards/?subject=subj_sol1">Alle SOL1-flashcards</a></nav><section class="hero"><div class="badge">SOL 1 · Flashcards 2.0</div><h1>Avanserte forelesningsdekk</h1><p class="sub">Komplett modulær versjon med F2–F11. Hvert dekk er basert på forelesningsnotatene og laget for eksamensklare utledninger og caseoppgaver.</p></section></header>
<main class="wrap">
<section class="panel hub" id="hub"><div class="toolbar"><div class="stats"><span class="stat"><b id="stat-decks">0</b> dekker</span><span class="stat"><b id="stat-cards">0</b> kort totalt</span><span class="stat"><b id="stat-ready">0</b> klare</span></div><label class="search">🔎 <input id="search" type="search" placeholder="Søk i dekker…"></label></div><div class="grid" id="deck-grid"><div class="status-msg">Laster forelesningsdekk …</div></div></section>
<section class="panel study" id="study"><div class="study-head"><button class="back-btn" id="back-to-hub">← Alle dekker</button><span class="count" id="counter"></span></div><h2 id="study-title"></h2><div class="progress"><div class="bar" id="bar"></div></div><div class="card" id="card"><div class="tag" id="tag"></div><div class="label" id="card-label"></div><div class="front" id="front"></div><div class="back" id="back" style="display:none"></div><div class="hint" id="hint"></div></div><div class="actions"><button class="btn secondary" id="prev">← Forrige</button><button class="btn primary" id="next">Neste →</button></div><div class="rating"><button class="rate bad">Kunne ikke</button><button class="rate mid">Halvveis</button><button class="rate good">Kunne det</button></div></section>
</main>
<script>
window.SOL1_FC2_GZIP=[];
const lectureFiles=['f2','f3','f4','f5','f6','f7','f8','f9','f10','f11'];
let decks=[],current=null,idx=0,flipped=false;
const hub=document.getElementById('hub'),study=document.getElementById('study'),grid=document.getElementById('deck-grid'),search=document.getElementById('search');
function loadScript(src){return new Promise((resolve,reject)=>{const s=document.createElement('script');s.src=src+(src.includes('?')?'&':'?')+'v='+Date.now();s.onload=resolve;s.onerror=()=>reject(new Error(src));document.head.appendChild(s);});}
async function loadAllData(){const failed=[];for(const f of lectureFiles){try{await loadScript('flashcards-2-data/'+f+'.js');}catch(e){failed.push(f);console.warn('Klarte ikke laste skriptfil '+f,e);}}if(!window.pako)throw new Error('Pako-biblioteket ble ikke lastet.');const raw=window.SOL1_FC2_GZIP||[];decks=[];for(const s of raw){try{decks.push(unzipDeck(s));}catch(e){failed.push('(deck-data)');console.warn('Klarte ikke dekomprimere ett dekk',e);}}decks.sort((a,b)=>parseInt(a.id.slice(1))-parseInt(b.id.slice(1)));if(!decks.length)throw new Error('Ingen forelesningsdekk kunne lastes.');renderDecks(failed);}
function unzipDeck(s){const bin=atob(s),bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return JSON.parse(pako.ungzip(bytes,{to:'string'}));}
function renderDecks(failed){const q=(search.value||'').toLowerCase();grid.innerHTML='';decks.filter(d=>(d.num+d.title+d.desc).toLowerCase().includes(q)).forEach(d=>{const btn=document.createElement('button');btn.className='deck';btn.innerHTML=`<div class="deck-head"><span class="num">${d.num}</span><span class="pill">${d.difficulty}</span></div><div class="title">${d.title}</div><div class="desc">${d.desc}</div><div class="foot"><span>${d.cards.length} kort</span><span>Start →</span></div>`;btn.onclick=()=>start(d.id);grid.appendChild(btn);});document.getElementById('stat-decks').textContent=decks.length;document.getElementById('stat-cards').textContent=decks.reduce((s,d)=>s+d.cards.length,0);document.getElementById('stat-ready').textContent=decks.filter(d=>d.cards.length).length;if(!grid.children.length)grid.innerHTML='<div class="status-msg">Ingen dekk matcher søket.</div>';if(failed&&failed.length){const note=document.createElement('div');note.className='status-msg';note.style.cssText='grid-column:1/-1;background:#fef3c7;border:1px solid #fde68a;color:#92400e;border-radius:12px;padding:12px;font-size:12.5px;font-weight:700';note.textContent='Merk: '+failed.length+' forelesningsdekk kunne ikke lastes ('+failed.join(', ')+'). De øvrige fungerer som normalt.';grid.prepend(note);}}
function start(id){current=decks.find(d=>d.id===id);idx=0;flipped=false;hub.classList.add('hidden');study.classList.add('active');document.getElementById('study-title').textContent=current.num+' — '+current.title;show();}
function show(){const c=current.cards[idx];flipped=false;document.getElementById('tag').textContent=c.tag||'Eksamen';document.getElementById('card-label').textContent='Spørsmål';document.getElementById('front').innerHTML=c.q;document.getElementById('back').innerHTML=c.a;document.getElementById('front').style.display='block';document.getElementById('back').style.display='none';document.getElementById('hint').textContent='Klikk på kortet for å se svar';document.getElementById('counter').textContent=(idx+1)+' / '+current.cards.length;document.getElementById('bar').style.width=((idx+1)/current.cards.length*100)+'%';}
function flip(){flipped=!flipped;document.getElementById('front').style.display=flipped?'none':'block';document.getElementById('back').style.display=flipped?'block':'none';document.getElementById('card-label').textContent=flipped?'Svar':'Spørsmål';document.getElementById('hint').textContent=flipped?'Klikk for å se spørsmål':'Klikk på kortet for å se svar';}
function next(){idx=(idx+1)%current.cards.length;show()}function prev(){idx=(idx-1+current.cards.length)%current.cards.length;show()}
document.getElementById('card').onclick=flip;document.getElementById('next').onclick=next;document.getElementById('prev').onclick=prev;document.getElementById('back-to-hub').onclick=()=>{study.classList.remove('active');hub.classList.remove('hidden');};document.querySelectorAll('.rate').forEach(b=>b.onclick=next);search.oninput=renderDecks;document.addEventListener('keydown',e=>{if(!current)return;if(e.key===' '){e.preventDefault();flip()}if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')document.getElementById('back-to-hub').click();});
loadAllData().catch(err=>{console.error(err);grid.innerHTML='<div class="status-msg error">Kunne ikke laste forelesningsdekkene. Prøv å hard-refreshe siden. Feil: '+err.message+'</div>';});
</script>
</body></html>
