<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logg inn — StudieHub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0f172a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 24px;
  padding: 44px 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 32px 64px rgba(0,0,0,.4);
  text-align: center;
  animation: fadeUp .35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.logo { font-size: 40px; margin-bottom: 12px; }
.brand { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.4px; margin-bottom: 4px; }
.tagline { font-size: 13px; color: #64748b; margin-bottom: 32px; }

.tabs {
  display: flex;
  background: #f1f5f9;
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 28px;
}
.tab {
  flex: 1; padding: 9px; border: none; background: transparent;
  border-radius: 8px; font-size: 13px; font-weight: 600;
  color: #64748b; cursor: pointer; transition: all .2s; font-family: inherit;
}
.tab.active { background: #fff; color: #0f172a; box-shadow: 0 1px 4px rgba(0,0,0,.12); }

form { text-align: left; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
.field input {
  width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0;
  border-radius: 10px; font-size: 14px; outline: none;
  font-family: inherit; transition: border-color .2s; background: #fff; color: #0f172a;
}
.field input:focus { border-color: #6366f1; }
.err { font-size: 12px; color: #dc2626; min-height: 16px; margin-bottom: 10px; line-height: 1.4; }
.btn {
  width: 100%; padding: 13px; background: #6366f1; color: #fff;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background .2s; font-family: inherit; margin-top: 2px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover { background: #4f46e5; }
.btn:disabled { background: #a5b4fc; cursor: default; }
.spinner {
  width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.35);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .7s linear infinite; display: none;
}
.btn.loading .spinner { display: block; }
.btn.loading .btn-text::after { content: '…'; }

.verify-box { text-align: center; padding: 12px 0; }
.verify-icon { font-size: 44px; margin-bottom: 14px; }
.verify-box h3 { font-size: 18px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
.verify-box p { font-size: 13px; color: #64748b; line-height: 1.6; }
.verify-box strong { color: #0f172a; }

@keyframes spin { to { transform: rotate(360deg); } }

.divider { height: 1px; background: #f1f5f9; margin: 24px 0 20px; }
.back-link { font-size: 13px; color: #6366f1; text-decoration: none; font-weight: 500; }
.back-link:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .card { padding: 36px 24px; }
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">📚</div>
  <div class="brand">StudieHub</div>
  <p class="tagline">Logg inn for å få tilgang til læringsverktøyene dine</p>

  <div class="tabs" id="tabBar">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Logg inn</button>
    <button class="tab" id="tabRegister" onclick="switchTab('register')">Registrer deg</button>
  </div>

  <!-- Login -->
  <form id="formLogin" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="loginEmail">E-post</label>
      <input type="email" id="loginEmail" placeholder="din@epost.no" required autocomplete="email">
    </div>
    <div class="field">
      <label for="loginPassword">Passord</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <div class="err" id="loginErr"></div>
    <button type="submit" class="btn" id="loginBtn">
      <span class="spinner"></span>
      <span class="btn-text">Logg inn</span>
    </button>
  </form>

  <!-- Register -->
  <form id="formRegister" style="display:none" onsubmit="handleRegister(event)">
    <div class="field">
      <label for="regEmail">E-post</label>
      <input type="email" id="regEmail" placeholder="din@epost.no" required autocomplete="email">
    </div>
    <div class="field">
      <label for="regPassword">Passord</label>
      <input type="password" id="regPassword" placeholder="Minst 6 tegn" required minlength="6" autocomplete="new-password">
    </div>
    <div class="field">
      <label for="regConfirm">Bekreft passord</label>
      <input type="password" id="regConfirm" placeholder="Gjenta passord" required autocomplete="new-password">
    </div>
    <div class="err" id="regErr"></div>
    <button type="submit" class="btn" id="regBtn">
      <span class="spinner"></span>
      <span class="btn-text">Opprett konto</span>
    </button>
  </form>

  <!-- Email verify -->
  <div id="verifyMsg" style="display:none" class="verify-box">
    <div class="verify-icon">✉️</div>
    <h3>Sjekk innboksen!</h3>
    <p>Vi sendte en bekreftelseslenke til<br><strong id="verifyAddr"></strong>.<br>Klikk lenken for å aktivere kontoen.</p>
  </div>
</div>

<script>
var SB_URL  = 'https://qnwjhheoekpqqqhevztw.supabase.co';
var SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFud2poaGVvZWtwcXFxaGV2enR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTg1NTEsImV4cCI6MjA5MjI5NDU1MX0.gHBvEH-L-zyiW4UnsCxOY2q-HmeIYe5OHSvxhFt7PQ8';
var sb = window.supabase.createClient(SB_URL, SB_KEY);

function getNextUrl() {
  var p = new URLSearchParams(window.location.search).get('next');
  return (p && p.startsWith('http')) ? p : './';
}

// If already logged in, skip login page
sb.auth.getSession().then(function(r) {
  if (r.data && r.data.session) window.location.replace(getNextUrl());
});

sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN' && session) {
    window.location.replace(getNextUrl());
  }
});

function switchTab(tab) {
  document.getElementById('formLogin').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('formRegister').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('verifyMsg').style.display    = 'none';
  document.getElementById('tabLogin').classList.toggle('active',    tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
}


function showInfoFromQuery() {
  var msg = new URLSearchParams(window.location.search).get('msg');
  if (msg === 'verify_email') {
    var err = document.getElementById('loginErr');
    if (err) err.textContent = 'Du må bekrefte e-posten før du kan bruke appen. Sjekk innboks/spam eller prøv registrering på nytt.';
  }
}

function setLoading(btn, on) {
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

function errMsg(msg) {
  if (!msg) return 'En ukjent feil oppstod.';
  if (msg.includes('Invalid login credentials'))           return 'Feil e-post eller passord.';
  if (msg.includes('Email not confirmed'))                 return 'E-posten er ikke bekreftet. Sjekk innboksen.';
  if (msg.includes('User already registered'))             return 'Denne e-posten er allerede registrert.';
  if (msg.includes('Password should be at least'))         return 'Passordet må være minst 6 tegn.';
  if (msg.includes('rate limit') || msg.includes('over_email_send_rate_limit')) return 'For mange forsøk — vent litt og prøv igjen.';
  return msg;
}

function handleLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginErr');
  err.textContent = '';
  setLoading(btn, true);
  sb.auth.signInWithPassword({
    email: document.getElementById('loginEmail').value,
    password: document.getElementById('loginPassword').value
  }).then(function(r) {
    if (r.error) { err.textContent = errMsg(r.error.message); setLoading(btn, false); }
    // On success: onAuthStateChange redirects
  });
}

function handleRegister(e) {
  e.preventDefault();
  var btn  = document.getElementById('regBtn');
  var err  = document.getElementById('regErr');
  var pwd  = document.getElementById('regPassword').value;
  var conf = document.getElementById('regConfirm').value;
  err.textContent = '';
  if (pwd !== conf) { err.textContent = 'Passordene stemmer ikke overens.'; return; }
  setLoading(btn, true);
  var email = document.getElementById('regEmail').value;
  sb.auth.signUp({
    email: email,
    password: pwd,
    options: { emailRedirectTo: window.location.origin + window.location.pathname.replace('login.html','') + 'flashcards/' }
  }).then(function(r) {
    if (r.error) { err.textContent = errMsg(r.error.message); setLoading(btn, false); }
    else {
      document.getElementById('tabBar').style.display    = 'none';
      document.getElementById('formRegister').style.display = 'none';
      document.getElementById('verifyMsg').style.display    = 'block';
      document.getElementById('verifyAddr').textContent = email;
    }
  });
}
</script>
</body>
</html>
