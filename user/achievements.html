<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prestasjoner — StudieHub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --header-bg: #0f172a;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --accent: #6366f1;
  --radius-lg: 20px;
  --radius-md: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --transition: 0.22s cubic-bezier(.4,0,.2,1);
}

body {
  font-family:'Lora',Georgia,'Times New Roman',serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.site-header {
  background: var(--header-bg);
  padding: 0 24px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.site-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-mark {
  width: 32px; height: 32px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.logo-text { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.header-back {
  display: flex; align-items: center; gap: 6px;
  color: #94a3b8; font-size: 13px; font-weight: 500;
  text-decoration: none; padding: 6px 12px;
  border-radius: var(--radius-md);
  transition: background var(--transition), color var(--transition);
}
.header-back:hover { background: rgba(255,255,255,.08); color: #e2e8f0; }

/* ── Page hero ── */
.page-hero {
  background: var(--header-bg);
  padding: 36px 24px 56px;
  text-align: center;
}
.hero-icon { font-size: 36px; margin-bottom: 12px; }
.hero-title { font-size: 26px; font-weight: 700; color: #f8fafc; letter-spacing: -0.5px; margin-bottom: 6px; }
.hero-sub { font-size: 14px; color: #94a3b8; }
.hero-counter {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 16px;
  background: rgba(99,102,241,.2); border: 1px solid rgba(99,102,241,.35);
  color: #a5b4fc; font-size: 13px; font-weight: 600;
  padding: 6px 14px; border-radius: 20px;
}

/* ── Content ── */
.main {
  max-width: 680px;
  margin: -28px auto 0;
  padding: 0 20px 60px;
  position: relative; z-index: 1;
}

/* ── Section label ── */
.section-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--muted); margin: 24px 0 12px;
}
.section-label:first-child { margin-top: 0; }

/* ── Badge card ── */
.badge-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 20px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 18px;
  animation: fadeUp .4s ease both;
  transition: transform var(--transition), box-shadow var(--transition);
  position: relative;
  overflow: hidden;
}
.badge-card.unlocked {
  border-color: transparent;
}
.badge-card.unlocked::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--radius-lg);
  padding: 1px;
  background: linear-gradient(135deg, var(--badge-from), var(--badge-to));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.badge-card.locked { opacity: 0.65; filter: grayscale(0.4); }
.badge-card:hover:not(.locked) {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md), 0 0 0 2px rgba(99,102,241,.1);
}

.badge-emoji-wrap {
  width: 60px; height: 60px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.badge-body { flex: 1; min-width: 0; }
.badge-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.badge-desc { font-size: 13px; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }

.badge-progress {
  height: 6px; background: var(--border);
  border-radius: 999px; overflow: hidden;
}
.badge-progress-fill {
  height: 100%; border-radius: 999px;
  width: 0%; transition: width 1s cubic-bezier(.4,0,.2,1);
}
.badge-progress-label {
  font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 5px;
}

.badge-status {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.check-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
}
.check-circle.done { background: #bbf7d0; color: #15803d; }
.check-circle.not-done { background: var(--border); color: var(--muted); font-size: 16px; }
.badge-status-label { font-size: 10px; font-weight: 600; color: var(--muted); text-align: center; }

.unlocked-ribbon {
  position: absolute; top: 12px; right: 12px;
  background: #bbf7d0; color: #15803d;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 3px 8px; border-radius: 20px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .badge-card { flex-direction: column; align-items: flex-start; }
  .badge-status { flex-direction: row; }
}
</style>
</head>
<body>

<header class="site-header">
  <a class="site-logo" href="../index.html">
    <div class="logo-mark">📚</div>
    <span class="logo-text">StudieHub</span>
  </a>
  <a class="header-back" href="index.html">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Brukerområde
  </a>
</header>

<section class="page-hero">
  <div class="hero-icon">🏆</div>
  <div class="hero-title">Prestasjoner</div>
  <div class="hero-sub">Lås opp badges ved å nå studiemål</div>
  <div class="hero-counter" id="heroCounter">0 av 0 låst opp</div>
</section>

<main class="main" id="achList"></main>

<script src="auth-guard.js"></script>
<script>
function getStats() {
  try { return JSON.parse(localStorage.getItem('fc_stats') || '{}'); } catch(e) { return {}; }
}
function dayKey(s) { return new Date(s).toISOString().slice(0,10); }

window.onUserAuthorized = function() {
  var st = getStats();
  var sessions = [], quiz = [], totalCards = 0;
  Object.values(st).forEach(function(d) {
    (d.sessions || []).forEach(function(x) { sessions.push(x); totalCards += x.total || 0; });
    (d.quizSessions || []).forEach(function(q) { quiz.push(q); });
  });

  var allDays = sessions.map(function(s){ return dayKey(s.date); })
    .concat(quiz.map(function(q){ return dayKey(q.date); }));
  allDays = allDays.filter(function(v,i,a){ return a.indexOf(v)===i; }).sort();
  var maxStreak = allDays.length ? 1 : 0, cur = 1;
  for (var i = 1; i < allDays.length; i++) {
    if ((new Date(allDays[i]) - new Date(allDays[i-1])) === 86400000) { cur++; maxStreak = Math.max(maxStreak,cur); }
    else cur = 1;
  }
  var good3 = quiz.filter(function(q){ return (q.pct||0) >= 80; }).length;
  var totalActs = sessions.length + quiz.length;

  var badges = [
    {
      emoji: '🥇', title: 'Første steg', desc: 'Fullfør din første studieøkt eller quiz.',
      from: '#fbbf24', to: '#f59e0b', bg: '#fef9c3',
      done: totalActs >= 1,
      progress: Math.min(totalActs, 1), goal: 1, unit: 'økt'
    },
    {
      emoji: '🔥', title: '7-dagers streak', desc: 'Vær aktiv 7 dager på rad.',
      from: '#f97316', to: '#ef4444', bg: '#fff7ed',
      done: maxStreak >= 7,
      progress: Math.min(maxStreak, 7), goal: 7, unit: 'dager'
    },
    {
      emoji: '🧠', title: 'Quiz-mester', desc: 'Oppnå 80% eller mer på tre separate quizer.',
      from: '#8b5cf6', to: '#6366f1', bg: '#f5f3ff',
      done: good3 >= 3,
      progress: Math.min(good3, 3), goal: 3, unit: 'quizer'
    },
    {
      emoji: '📇', title: 'Kortsamler', desc: 'Gå gjennom totalt 200 flashcards.',
      from: '#10b981', to: '#059669', bg: '#f0fdf4',
      done: totalCards >= 200,
      progress: Math.min(totalCards, 200), goal: 200, unit: 'kort'
    },
    {
      emoji: '⚡', title: 'Rask starter', desc: 'Fullfør 5 studieøkter.',
      from: '#06b6d4', to: '#0891b2', bg: '#f0f9ff',
      done: sessions.length >= 5,
      progress: Math.min(sessions.length, 5), goal: 5, unit: 'økter'
    },
    {
      emoji: '🎯', title: 'Presisjonsquiz', desc: 'Fullfør en quiz med 100% score.',
      from: '#ec4899', to: '#db2777', bg: '#fdf2f8',
      done: quiz.some(function(q){ return (q.pct||0) === 100; }),
      progress: quiz.some(function(q){ return (q.pct||0) === 100; }) ? 1 : 0, goal: 1, unit: 'perfekt quiz'
    }
  ];

  var unlocked = badges.filter(function(b){ return b.done; }).length;
  document.getElementById('heroCounter').textContent = unlocked + ' av ' + badges.length + ' låst opp';

  var unlockedBadges = badges.filter(function(b){ return b.done; });
  var lockedBadges   = badges.filter(function(b){ return !b.done; });
  var list = document.getElementById('achList');

  if (unlockedBadges.length) {
    var lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Låst opp';
    list.appendChild(lbl);
    unlockedBadges.forEach(function(b, i) { list.appendChild(makeCard(b, i)); });
  }

  if (lockedBadges.length) {
    var lbl2 = document.createElement('div');
    lbl2.className = 'section-label';
    lbl2.textContent = 'Ikke ennå';
    list.appendChild(lbl2);
    lockedBadges.forEach(function(b, i) { list.appendChild(makeCard(b, unlockedBadges.length + i)); });
  }

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      document.querySelectorAll('.badge-progress-fill').forEach(function(el) {
        el.style.width = el.getAttribute('data-w') + '%';
      });
    });
  });
};

function makeCard(b, i) {
  var card = document.createElement('div');
  card.className = 'badge-card ' + (b.done ? 'unlocked' : 'locked');
  card.style.setProperty('--badge-from', b.from);
  card.style.setProperty('--badge-to', b.to);
  card.style.animationDelay = (i * 0.07) + 's';

  var pctW = Math.round((b.progress / b.goal) * 100);

  card.innerHTML = ''
    + (b.done ? '<div class="unlocked-ribbon">Låst opp</div>' : '')
    + '<div class="badge-emoji-wrap" style="background:'+b.bg+'">'+b.emoji+'</div>'
    + '<div class="badge-body">'
    +   '<div class="badge-title">'+b.title+'</div>'
    +   '<div class="badge-desc">'+b.desc+'</div>'
    +   (!b.done
        ? '<div class="badge-progress"><div class="badge-progress-fill" data-w="'+pctW+'" style="background:linear-gradient(90deg,'+b.from+','+b.to+')"></div></div>'
        +   '<div class="badge-progress-label">'+b.progress+' / '+b.goal+' '+b.unit+'</div>'
        : '<div class="badge-progress-label" style="color:'+b.from+'">'+b.progress+' / '+b.goal+' '+b.unit+' — fullført!</div>'
       )
    + '</div>'
    + '<div class="badge-status">'
    +   '<div class="check-circle '+(b.done ? 'done' : 'not-done')+'">'+(b.done ? '✓' : '🔒')+'</div>'
    + '</div>';

  return card;
}
</script>
</body>
</html>
