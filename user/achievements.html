<!DOCTYPE html><html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prestasjoner</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Inter,system-ui;background:#f1f5f9;color:#0f172a}.wrap{max-width:860px;margin:0 auto;padding:24px}.ach{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between}.done{border-color:#86efac;background:#f0fdf4}</style></head><body><div class="wrap"><a href="index.html">← Tilbake</a><h1>Badges / prestasjoner</h1><div id="ach"></div></div><script src="auth-guard.js"></script><script>
function getStats(){try{return JSON.parse(localStorage.getItem('fc_stats')||'{}')}catch(e){return{}}}
function dayKey(s){return new Date(s).toISOString().slice(0,10)}
window.onUserAuthorized=function(){var st=getStats(),sessions=[],quiz=[],cards=0;Object.values(st).forEach(function(d){(d.sessions||[]).forEach(function(x){sessions.push(x);cards+=x.total||0});(d.quizSessions||[]).forEach(function(q){quiz.push(q)})});var days=[...new Set(sessions.map(s=>dayKey(s.date)).concat(quiz.map(q=>dayKey(q.date))))].sort();var streak=days.length?1:0,cur=1;for(var i=1;i<days.length;i++){if((new Date(days[i])-new Date(days[i-1]))===86400000){cur++;streak=Math.max(streak,cur)}else cur=1}var good3=quiz.filter(q=>(q.pct||0)>=80).length>=3;var model=[['🥇 Første økt fullført',sessions.length+quiz.length>=1],['🔥 7 dager aktivitet',streak>=7],['🧠 Quiz-mester (80%+ x3)',good3],['📇 200 kort gjennomgått',cards>=200]];document.getElementById('ach').innerHTML=model.map(function(m){return '<div class="ach '+(m[1]?'done':'')+'"><span>'+m[0]+'</span><strong>'+(m[1]?'Låst opp':'Ikke ennå')+'</strong></div>'}).join('')}
</script></body></html>
