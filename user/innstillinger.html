<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innstillinger — Haugnes Flashcards</title>
<link rel="icon" href="../assets/haugnes-logo-mark.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px;color:#f8fbff;background:radial-gradient(circle at 18% 12%,rgba(47,98,255,.18),transparent 25%),radial-gradient(circle at 80% 4%,rgba(232,188,104,.12),transparent 24%),linear-gradient(180deg,#06142d,#071835 56%,#06142d)}
a{text-decoration:none;color:inherit}
.card{width:min(560px,100%);text-align:center;padding:40px 32px;border-radius:24px;background:linear-gradient(180deg,rgba(14,39,84,.92),rgba(8,26,58,.92));border:1px solid rgba(255,255,255,.12);box-shadow:0 24px 60px rgba(0,0,0,.35)}
.avatar{width:70px;height:70px;margin:0 auto 16px;border-radius:50%;display:grid;place-items:center;font-size:28px;font-weight:900;background:linear-gradient(135deg,#2f62ff,#e8bc68)}
h1{font-size:27px;letter-spacing:-.03em;margin-bottom:6px}
.email{color:#aebfe0;font-size:14px;margin-bottom:24px}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#ffd98f;background:rgba(232,188,104,.14);border:1px solid rgba(232,188,104,.26);padding:6px 12px;border-radius:999px;margin-bottom:18px}
p{color:#aebfe0;line-height:1.6;font-size:14px;max-width:420px;margin:0 auto 26px}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.back{display:inline-flex;align-items:center;gap:9px;height:46px;padding:0 22px;border-radius:13px;background:linear-gradient(135deg,#245cff,#4b7dff);color:#fff;font-weight:850;font-size:14px;box-shadow:0 16px 32px rgba(47,98,255,.30)}
.logout{height:46px;padding:0 22px;border-radius:13px;border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.08);color:#fecaca;font-weight:800;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<main class="card">
  <div class="avatar" id="avatar">?</div>
  <h1 id="name">Bruker</h1>
  <div class="email" id="email">NHH-student</div>
  <div class="tag">Kommer snart</div>
  <p>Profil, varslinger, studiemål og Premium-abonnement vil kunne styres herfra. Foreløpig kan du logge ut nedenfor.</p>
  <div class="row">
    <a class="back" href="index.html">← Tilbake til dashbord</a>
    <button class="logout" onclick="handleLogout()">Logg ut</button>
  </div>
</main>
<script src="auth-guard.js"></script>
<script>
function nameFromEmail(email){var u=(email||'student').split('@')[0];return u.charAt(0).toUpperCase()+u.slice(1)}
window.onUserAuthorized=function(session){var email=session&&session.user&&session.user.email||'';var name=nameFromEmail(email);document.getElementById('name').textContent=name;document.getElementById('avatar').textContent=name.charAt(0).toUpperCase();if(email)document.getElementById('email').textContent=email}
function handleLogout(){var U='https://qnwjhheoekpqqqhevztw.supabase.co';var K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJxfud2poaGVvZWtwcXFxaGV2enR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTg1NTEsImV4cCI6MjA5MjI5NDU1MX0.gHBvEH-L-zyiW4UnsCxOY2q-HmeIYe5OHSvxhFt7PQ8'.replace('xfud2','nwjh');var sb=window.supabase.createClient(U,K);sb.auth.signOut().finally(function(){window.location.replace('../login.html')})}
</script>
</body>
</html>
