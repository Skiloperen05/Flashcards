<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oppgavebank — Haugnes Flashcards</title>
<link rel="icon" href="../assets/haugnes-logo-mark.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px;color:#f8fbff;background:radial-gradient(circle at 18% 12%,rgba(47,98,255,.18),transparent 25%),radial-gradient(circle at 80% 4%,rgba(232,188,104,.12),transparent 24%),linear-gradient(180deg,#06142d,#071835 56%,#06142d)}
a{text-decoration:none;color:inherit}
.card{width:min(560px,100%);text-align:center;padding:40px 32px;border-radius:24px;background:linear-gradient(180deg,rgba(14,39,84,.92),rgba(8,26,58,.92));border:1px solid rgba(255,255,255,.12);box-shadow:0 24px 60px rgba(0,0,0,.35)}
.icon{width:70px;height:70px;margin:0 auto 20px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,#7c3aed,#a855f7);box-shadow:0 16px 34px rgba(124,58,237,.34)}
.icon svg{width:34px;height:34px;stroke:#fff;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:27px;letter-spacing:-.03em;margin-bottom:10px}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#ffd98f;background:rgba(232,188,104,.14);border:1px solid rgba(232,188,104,.26);padding:6px 12px;border-radius:999px;margin-bottom:18px}
p{color:#aebfe0;line-height:1.6;font-size:15px;max-width:420px;margin:0 auto 26px}
.links{display:grid;gap:10px;max-width:340px;margin:0 auto 26px}
.links a{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);font-weight:750;font-size:14px}
.links a:hover{background:rgba(255,255,255,.09)}
.back{display:inline-flex;align-items:center;gap:9px;height:46px;padding:0 22px;border-radius:13px;background:linear-gradient(135deg,#245cff,#4b7dff);color:#fff;font-weight:850;font-size:14px;box-shadow:0 16px 32px rgba(47,98,255,.30)}
</style>
</head>
<body>
<main class="card">
  <div class="icon"><svg viewBox="0 0 24 24"><path d="M4 13.5 6.5 5h11L20 13.5"/><path d="M4 13.5v5.5h16v-5.5"/><path d="M8.5 13.5a3.5 3.5 0 0 0 7 0"/></svg></div>
  <div class="tag">Under utvikling</div>
  <h1>Oppgavebank</h1>
  <p>En samlet bank med øvingsoppgaver per fag. Foreløpig finnes SAM2 sine klikkbare oppgaver allerede — flere fag legges til etter hvert.</p>
  <div class="links">
    <a href="../sam2/oppgaver-klikkbar/">SAM2 — klikkbare oppgaver <span>→</span></a>
    <a href="../sam2/oppgaver/">SAM2 — oppgaveoversikt <span>→</span></a>
  </div>
  <a class="back" href="index.html">← Tilbake til dashbord</a>
</main>
<script src="auth-guard.js"></script>
</body>
</html>
