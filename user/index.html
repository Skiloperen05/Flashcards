<!DOCTYPE html><html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Brukerområde — StudieHub</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--bg:#f1f5f9;--surface:#fff;--header-bg:#0f172a;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--radius-lg:20px;--radius-md:12px;--shadow:0 4px 16px rgba(0,0,0,.08)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text)}.header{background:var(--header-bg);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.header a{color:#cbd5e1;text-decoration:none;font-size:13px}.wrap{max-width:920px;margin:0 auto;padding:28px 18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:18px}.k{font-size:12px;color:var(--muted);text-transform:uppercase}.v{font-size:30px;font-weight:700}.actions{display:flex;gap:10px;margin-top:14px}.btn{padding:10px 14px;border-radius:var(--radius-md);border:1px solid var(--border);text-decoration:none;color:var(--text);font-size:13px;background:#fff}
</style></head><body><div class="header"><strong>👤 Brukerområde</strong><a href="../index.html">← Hjem</a></div><div class="wrap"><div class="grid"><div class="card"><div class="k">Totale økter</div><div class="v" id="sessions">0</div></div><div class="card"><div class="k">Kort gjennomgått</div><div class="v" id="cards">0</div></div><div class="card"><div class="k">Quiz-forsøk</div><div class="v" id="quiz">0</div></div><div class="card"><div class="k">Gjennomsnitt quiz</div><div class="v" id="avg">0%</div></div></div><div class="actions"><a class="btn" href="progress.html">Se progresjon</a><a class="btn" href="achievements.html">Se prestasjoner</a><a class="btn" href="../flashcards/index.html">Til flashcards</a></div></div><script src="auth-guard.js"></script><script>
function getStats(){try{return JSON.parse(localStorage.getItem('fc_stats')||'{}')}catch(e){return{}}}
window.onUserAuthorized=function(){var s=getStats(),sess=0,cards=0,q=0,qp=[];Object.values(s).forEach(function(d){(d.sessions||[]).forEach(function(x){sess++;cards+=x.total||0});(d.quizSessions||[]).forEach(function(x){q++;qp.push(x.pct||0)})});document.getElementById('sessions').textContent=sess;document.getElementById('cards').textContent=cards;document.getElementById('quiz').textContent=q;document.getElementById('avg').textContent=(qp.length?Math.round(qp.reduce((a,b)=>a+b,0)/qp.length):0)+'%';}
</script></body></html>
