<!DOCTYPE html><html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Progresjon</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Inter,system-ui;background:#f1f5f9;color:#0f172a}.wrap{max-width:900px;margin:0 auto;padding:24px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:16px;margin-bottom:12px}.bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden}.fill{height:100%;background:#6366f1}</style></head><body><div class="wrap"><a href="index.html">← Tilbake</a><h1>Fag/deck-progresjon</h1><div id="list"></div></div><script src="auth-guard.js"></script><script>
function getStats(){try{return JSON.parse(localStorage.getItem('fc_stats')||'{}')}catch(e){return{}}}
window.onUserAuthorized=function(){var s=getStats(),html='';Object.entries(s).forEach(function(e){var id=e[0],d=e[1],ss=d.sessions||[],qs=d.quizSessions||[];var total=ss.reduce((a,x)=>a+(x.total||0),0);var right=ss.reduce((a,x)=>a+((x.results&&x.results.right)||0),0);var pct=total?Math.round((right/total)*100):0;var best=qs.length?Math.max.apply(null,qs.map(q=>q.pct||0)):0;html+='<div class="card"><strong>'+id+'</strong><div style="font-size:13px;color:#64748b">Flashcard-økter: '+ss.length+' · Kort: '+total+' · Quiz-forsøk: '+qs.length+'</div><div class="bar" style="margin:8px 0"><div class="fill" style="width:'+pct+'%"></div></div><div style="font-size:12px">Mestring: '+pct+'% · Beste quiz: '+best+'%</div></div>';});document.getElementById('list').innerHTML=html||'<div class="card">Ingen data ennå.</div>'}
</script></body></html>
