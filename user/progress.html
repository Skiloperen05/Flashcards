<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Progresjon — StudieHub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --header-bg: #0f172a;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --accent: #6366f1;
  --radius-lg: 20px;
  --radius-md: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --transition: 0.22s cubic-bezier(.4,0,.2,1);
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.site-header {
  background: var(--header-bg);
  padding: 0 24px;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.site-logo {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.logo-mark {
  width: 32px; height: 32px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.logo-text { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.header-back {
  display: flex; align-items: center; gap: 6px;
  color: #94a3b8; font-size: 13px; font-weight: 500;
  text-decoration: none; padding: 6px 12px;
  border-radius: var(--radius-md);
  transition: background var(--transition), color var(--transition);
}
.header-back:hover { background: rgba(255,255,255,.08); color: #e2e8f0; }

/* ── Page hero ── */
.page-hero {
  background: var(--header-bg);
  padding: 36px 24px 56px;
  text-align: center;
}
.hero-icon {
  font-size: 36px; margin-bottom: 12px;
}
.hero-title {
  font-size: 26px; font-weight: 700; color: #f8fafc; letter-spacing: -0.5px; margin-bottom: 6px;
}
.hero-sub { font-size: 14px; color: #94a3b8; }

/* ── Content ── */
.main {
  max-width: 720px;
  margin: -28px auto 0;
  padding: 0 20px 60px;
  position: relative; z-index: 1;
}

.empty-state {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 60px 24px;
  text-align: center;
}
.empty-icon { font-size: 44px; margin-bottom: 14px; }
.empty-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: var(--muted); }
.empty-link {
  display: inline-block; margin-top: 20px;
  background: var(--accent); color: #fff;
  padding: 10px 20px; border-radius: 10px;
  text-decoration: none; font-size: 13px; font-weight: 600;
  transition: background var(--transition);
}
.empty-link:hover { background: #4f46e5; }

.subject-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 24px;
  margin-bottom: 16px;
  animation: fadeUp .4s ease both;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
}
.subject-name {
  display: flex; align-items: center; gap: 10px;
}
.subject-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
}
.subject-title { font-size: 17px; font-weight: 700; color: var(--text); }
.mastery-badge {
  font-size: 12px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px;
}

.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px;
}
.mini-stat {
  background: var(--bg);
  border-radius: var(--radius-md);
  padding: 12px;
  text-align: center;
}
.mini-stat-val { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1; }
.mini-stat-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.4px; }

.progress-section { }
.progress-labels {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
}
.progress-label { font-size: 12px; font-weight: 600; color: var(--muted); }
.progress-pct { font-size: 13px; font-weight: 700; }
.bar-track {
  height: 10px; background: var(--border);
  border-radius: 999px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 999px;
  width: 0%;
  transition: width 1s cubic-bezier(.4,0,.2,1);
}

.quiz-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 13px; color: var(--muted);
}
.quiz-best { font-weight: 700; color: var(--text); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
}
</style>
</head>
<body>

<header class="site-header">
  <a class="site-logo" href="../index.html">
    <div class="logo-mark">📚</div>
    <span class="logo-text">StudieHub</span>
  </a>
  <a class="header-back" href="index.html">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Brukerområde
  </a>
</header>

<section class="page-hero">
  <div class="hero-icon">📈</div>
  <div class="hero-title">Din progresjon</div>
  <div class="hero-sub">Oversikt over fremgang per fag og deck</div>
</section>

<main class="main">
  <div id="list"></div>
</main>

<script src="auth-guard.js"></script>
<script>
var SUBJECT_COLORS = {
  'ret14': '#2563eb',
  'sol1':  '#059669',
  'sam2':  '#d97706',
  'sam3':  '#7c3aed',
  'met2':  '#dc2626',
  'mat10': '#0891b2'
};

function getColor(id) {
  var lower = id.toLowerCase();
  for (var key in SUBJECT_COLORS) {
    if (lower.indexOf(key) !== -1) return SUBJECT_COLORS[key];
  }
  return '#6366f1';
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function getStats() {
  try { return JSON.parse(localStorage.getItem('fc_stats') || '{}'); } catch(e) { return {}; }
}

window.onUserAuthorized = function() {
  var s = getStats();
  var entries = Object.entries(s);
  var list = document.getElementById('list');

  if (!entries.length) {
    list.innerHTML = '<div class="empty-state">'
      + '<div class="empty-icon">📭</div>'
      + '<div class="empty-title">Ingen data ennå</div>'
      + '<div class="empty-sub">Start en studieøkt for å se fremgangen din her.</div>'
      + '<a class="empty-link" href="../flashcards/">Gå til flashcards →</a>'
      + '</div>';
    return;
  }

  var cards = [];
  entries.forEach(function(entry, i) {
    var id = entry[0];
    var d  = entry[1];
    var ss = d.sessions || [];
    var qs = d.quizSessions || [];
    var total = ss.reduce(function(a,x){ return a + (x.total||0); }, 0);
    var right = ss.reduce(function(a,x){ return a + ((x.results && x.results.right)||0); }, 0);
    var pct  = total ? Math.round((right/total)*100) : 0;
    var best = qs.length ? Math.max.apply(null, qs.map(function(q){ return q.pct||0; })) : null;
    var color = getColor(id);
    var rgb   = hexToRgb(color);

    var masteryBg    = 'rgba('+rgb+',.12)';
    var masteryColor = color;
    var masteryLabel = pct >= 80 ? '🌟 Ekspert' : pct >= 50 ? '📘 På vei' : '🌱 Starter';

    var card = document.createElement('div');
    card.className = 'subject-card';
    card.style.animationDelay = (i * 0.08) + 's';
    card.innerHTML = ''
      + '<div class="card-header">'
      +   '<div class="subject-name">'
      +     '<div class="subject-dot" style="background:'+color+'"></div>'
      +     '<span class="subject-title">'+id.toUpperCase()+'</span>'
      +   '</div>'
      +   '<span class="mastery-badge" style="background:'+masteryBg+';color:'+masteryColor+'">'+masteryLabel+'</span>'
      + '</div>'
      + '<div class="stats-row">'
      +   '<div class="mini-stat"><div class="mini-stat-val">'+ss.length+'</div><div class="mini-stat-label">Økter</div></div>'
      +   '<div class="mini-stat"><div class="mini-stat-val">'+total+'</div><div class="mini-stat-label">Kort</div></div>'
      +   '<div class="mini-stat"><div class="mini-stat-val">'+qs.length+'</div><div class="mini-stat-label">Quizer</div></div>'
      + '</div>'
      + '<div class="progress-section">'
      +   '<div class="progress-labels">'
      +     '<span class="progress-label">Mestringsgrad</span>'
      +     '<span class="progress-pct" style="color:'+color+'">'+pct+'%</span>'
      +   '</div>'
      +   '<div class="bar-track">'
      +     '<div class="bar-fill" data-pct="'+pct+'" style="background:'+color+'"></div>'
      +   '</div>'
      + '</div>'
      + (best !== null
        ? '<div class="quiz-row"><span>Beste quiz-score</span><span class="quiz-best">'+best+'%</span></div>'
        : '')
      ;
    cards.push(card);
    list.appendChild(card);
  });

  // Animate progress bars after paint
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      document.querySelectorAll('.bar-fill').forEach(function(el) {
        el.style.width = el.getAttribute('data-pct') + '%';
      });
    });
  });
};
</script>
</body>
</html>
