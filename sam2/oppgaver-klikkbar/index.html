<!doctype html><html lang="no"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SAM2 oppgaveprioritering</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#172033;--muted:#64748b;--line:#fed7aa;--accent:#d97706;--dark:#0f172a;--high:#dc2626;--mid:#d97706;--low:#16a34a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:#f8f7f4;color:var(--ink);line-height:1.5}

/* ── Topbar ── */
.top{height:64px;background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:40}
.brand{color:#fff;text-decoration:none;font-weight:900;display:flex;gap:10px;align-items:center}
.mark{width:32px;height:32px;border-radius:8px;background:#6366f1;display:grid;place-items:center}
.crumb,.crumb a{color:#94a3b8;text-decoration:none;font-size:13px}

/* ── Hero ── */
.hero{background:var(--dark);padding:40px 28px 48px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(217,119,6,.18) 0%,transparent 60%);pointer-events:none}
.hero-inner{max-width:1200px;margin:auto;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;position:relative;z-index:1}
.hero-left h1{font-size:clamp(13px,1.5vw,15px);color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px}
.stats-strip{display:flex;gap:40px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column}
.stat-num{font-size:clamp(44px,6vw,72px);font-weight:900;letter-spacing:-.04em;line-height:1;color:#fff}
.stat-num.accent{color:#f59e0b}
.stat-label{font-size:13px;color:#94a3b8;margin-top:4px;font-weight:500}
.hero-featured{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:20px 22px;width:320px;flex-shrink:0;cursor:pointer;transition:background .15s,transform .15s;backdrop-filter:blur(4px)}
.hero-featured:hover{background:rgba(255,255,255,.11);transform:translateY(-2px)}
.feat-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#f59e0b;margin-bottom:10px}
.feat-nr{font-size:13px;font-weight:900;color:rgba(255,255,255,.5);margin-bottom:6px}
.feat-title{font-size:16px;font-weight:800;color:#fff;line-height:1.35;margin-bottom:10px}
.feat-meta{font-size:12px;color:#94a3b8}

/* ── Chapter nav ── */
.kap-nav{background:#fff;border-bottom:1px solid #e9e4da;position:sticky;top:64px;z-index:30;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.kap-nav::-webkit-scrollbar{display:none}
.kap-nav-inner{display:inline-flex;gap:4px;padding:10px 28px}
.kap-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font:inherit;font-size:12px;font-weight:700;color:var(--muted);background:none;border:1px solid transparent;cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
.kap-pill:hover{background:#fff7ed;color:var(--ink);border-color:var(--line)}
.kap-pill.has-high{color:#991b1b}
.kap-pill .kp-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── Main content ── */
.content{max-width:1200px;margin:auto;padding:0 28px 80px}

/* ── Del break ── */
.del-break{display:flex;align-items:center;gap:16px;padding:48px 0 20px}
.del-break-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:#fff;background:var(--accent);padding:5px 12px;border-radius:99px}
.del-break-name{font-size:18px;font-weight:800;color:var(--ink)}
.del-break-line{flex:1;height:1px;background:#e5ddd0}
.del-break-sub{font-size:13px;color:var(--muted);white-space:nowrap}

/* ── Chapter section ── */
.kap-section{margin-bottom:10px;position:relative}
.kap-header{display:flex;align-items:flex-start;gap:16px;padding:22px 0 14px;border-bottom:1px solid #e9e4da;position:relative}
.kap-bg-num{position:absolute;right:-4px;top:-18px;font-size:96px;font-weight:900;color:rgba(0,0,0,.04);line-height:1;pointer-events:none;user-select:none}
.kap-num-badge{width:44px;height:44px;border-radius:14px;background:#fff;border:1px solid #e9e4da;display:grid;place-items:center;font-size:16px;font-weight:900;color:var(--muted);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kap-info h2{font-size:16px;font-weight:800;margin-bottom:4px}
.kap-info-meta{display:flex;gap:8px;flex-wrap:wrap}
.kap-pill-sm{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.kap-pill-sm.mid{background:#fef3c7;color:#92400e;border-color:#fde68a}
.kap-pill-sm.low{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.kap-pill-sm.neutral{background:#f1f5f9;color:#475569;border:none}

/* ── Task rows ── */
.task-list{display:flex;flex-direction:column}
.task-row{display:flex;align-items:center;gap:12px;padding:12px 0 12px 12px;border-bottom:1px solid #f0ece6;cursor:pointer;transition:background .1s;position:relative;border-left:3px solid transparent;margin-left:-3px;border-radius:0}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:rgba(255,255,255,.9);border-radius:10px;border-left-color:transparent;margin-left:0;padding-left:15px}
.task-row.prio-high{border-left-color:#dc2626}
.task-row.prio-mid{border-left-color:#d97706}
.task-row.prio-low{border-left-color:#16a34a}
.task-row:hover.prio-high{border-left-color:#dc2626}
.task-row:hover.prio-mid{border-left-color:#d97706}
.task-row:hover.prio-low{border-left-color:#16a34a}
.row-nr{font-size:12px;font-weight:900;color:#9a3412;background:#ffedd5;border-radius:8px;padding:3px 8px;flex-shrink:0;min-width:40px;text-align:center}
.row-title{flex:1;font-size:14px;font-weight:600;color:var(--ink);min-width:0}
.task-row.prio-high .row-title{font-weight:800}
.task-row.prio-low .row-title{color:var(--muted);font-weight:500}
.row-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.badge{border-radius:99px;padding:3px 9px;font-size:11px;font-weight:900;white-space:nowrap;border:1px solid transparent}
.badge.high{background:#fee2e2;color:#991b1b;border-color:#fecaca}
.badge.mid{background:#fef3c7;color:#92400e;border-color:#fde68a}
.badge.low{background:#f1f5f9;color:#64748b;border-color:#e2e8f0}
.calc-dots{font-size:12px;letter-spacing:-1px}.calc-dots .on{color:#d97706}.calc-dots .off{color:#e2e8f0}
.saved-dot{width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0}
.tag-xs{font-size:10px;padding:2px 6px;border-radius:99px;background:#ede9fe;color:#5b21b6;border:1px solid #ddd6fe;white-space:nowrap}

/* ── Modal ── */
.modal{position:fixed;inset:0;background:rgba(15,23,42,.65);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}
.modal.open{display:flex}
.dialog{background:#fff;border-radius:24px;max-width:960px;width:100%;max-height:92vh;overflow:hidden;box-shadow:0 32px 90px rgba(15,23,42,.35);display:flex;flex-direction:column}
.dialog-head{padding:18px 22px 14px;border-bottom:1px solid var(--line);display:flex;gap:12px;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.dialog-head-left small{color:#9a3412;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px}
.dialog-head-left h2{margin:0 0 8px;font-size:18px;line-height:1.3}
.mchips{display:flex;gap:6px;flex-wrap:wrap}
.close-btn{border:0;background:#f1f5f9;border-radius:10px;width:36px;height:36px;font-size:18px;cursor:pointer;flex-shrink:0;display:grid;place-items:center}
.close-btn:hover{background:#e2e8f0}
.dialog-text{padding:14px 22px;font-size:14px;line-height:1.75;color:#374151;max-height:200px;overflow-y:auto;flex-shrink:0;border-bottom:1px solid #ffedd5;white-space:pre-wrap}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#f9fafb;min-height:220px}
#drawCanvas{position:absolute;top:0;left:0;touch-action:none;cursor:crosshair}
.draw-toolbar{display:flex;gap:8px;align-items:center;padding:9px 16px;background:#fff7ed;border-top:1px solid var(--line);flex-shrink:0;flex-wrap:wrap}
.tool-btn{padding:7px 13px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font:inherit;font-size:12px;font-weight:700;white-space:nowrap}
.tool-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tool-btn.red{border-color:#fecaca;color:#991b1b}.tool-btn.red:hover{background:#fee2e2}
#strokeWidth{width:72px;accent-color:var(--accent);cursor:pointer}
#colorPicker{width:34px;height:34px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;padding:2px;background:none}
.draw-sep{width:1px;height:26px;background:#e2e8f0;flex-shrink:0}
.save-lbl{margin-left:auto;font-size:12px;color:#10b981;font-weight:600;white-space:nowrap}

@media(max-width:768px){
  .hero-inner{grid-template-columns:1fr}.hero-featured{width:100%}.stats-strip{gap:24px}
  .stat-num{font-size:40px}.kap-bg-num{display:none}
  .del-break-name{font-size:15px}.row-right .badge{display:none}
  .crumb{display:none}
}
@media(max-width:540px){
  .modal{padding:0}.dialog{border-radius:0;max-height:100dvh}
  .hero{padding:28px 18px 36px}.content{padding:0 18px 60px}
  .kap-nav-inner{padding:8px 18px}
}
</style>
</head>
<body>

<!-- Modal -->
<div id="modal" class="modal" role="dialog" aria-modal="true">
  <div class="dialog">
    <div class="dialog-head">
      <div class="dialog-head-left">
        <small id="mId"></small>
        <h2 id="mTitle"></h2>
        <div class="mchips" id="mChips"></div>
      </div>
      <button class="close-btn" id="closeBtn" title="Lukk (Esc)">✕</button>
    </div>
    <div class="dialog-text" id="mText"></div>
    <div class="canvas-wrap" id="canvasWrap"><canvas id="drawCanvas"></canvas></div>
    <div class="draw-toolbar">
      <button class="tool-btn active" id="toolPen">✏️ Penn</button>
      <button class="tool-btn" id="toolEraser">◻ Viskelær</button>
      <div class="draw-sep"></div>
      <input type="color" id="colorPicker" value="#172033" title="Farge">
      <input type="range" id="strokeWidth" min="1" max="20" value="3" title="Tykkelse">
      <div class="draw-sep"></div>
      <button class="tool-btn red" id="clearCanvas">Tøm ark</button>
      <span class="save-lbl" id="saveLbl"></span>
    </div>
  </div>
</div>

<header class="top">
  <a class="brand" href="../../"><span class="mark">📚</span><span>StudieHub</span></a>
  <div class="crumb"><a href="../../">Hjem</a> › <a href="../">SAM2</a> › Oppgaver</div>
</header>

<!-- Hero -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <h1>SAM2 · Oppgaveprioritering</h1>
      <div class="stats-strip">
        <div class="stat-item">
          <span class="stat-num" id="statTotal">–</span>
          <span class="stat-label">Oppgaver totalt</span>
        </div>
        <div class="stat-item">
          <span class="stat-num accent" id="statHigh">–</span>
          <span class="stat-label">Høy prioritet</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="statAnswered">–</span>
          <span class="stat-label">Besvart</span>
        </div>
      </div>
    </div>
    <button class="hero-featured" id="heroFeatured" aria-label="Åpne toppoppgaven">
      <div class="feat-label">Prioritert akkurat nå</div>
      <div class="feat-nr" id="featNr"></div>
      <div class="feat-title" id="featTitle">Laster …</div>
      <div class="feat-meta" id="featMeta"></div>
    </button>
  </div>
</section>

<!-- Chapter nav -->
<nav class="kap-nav" aria-label="Kapittelnavigasjon">
  <div class="kap-nav-inner" id="kapNav"></div>
</nav>

<!-- Content -->
<div class="content" id="mainContent"></div>

<script>
const META={
  '1.1':{s:24,p:'Lav',c:1,f:0},'1.2':{s:41,p:'Middels',c:2,f:1},'1.3':{s:55,p:'Middels',c:3,f:1},
  '1.4':{s:95,p:'Høy',c:2,f:1},'1.5':{s:26,p:'Lav',c:2,f:0},'1.6':{s:29,p:'Lav',c:2,f:1},
  '2.1':{s:77,p:'Høy',c:3,f:1},'2.2':{s:64,p:'Middels',c:3,f:1},'2.3':{s:94,p:'Høy',c:2,f:1},
  '2.4':{s:35,p:'Lav',c:2,f:0},'2.5':{s:81,p:'Høy',c:3,f:1},'2.6':{s:48,p:'Middels',c:3,f:1},
  '3.2':{s:82,p:'Høy',c:3,f:1},'3.3':{s:89,p:'Høy',c:3,f:1},'3.4':{s:59,p:'Middels',c:3,f:1},
  '3.5':{s:67,p:'Middels',c:2,f:1},'3.6':{s:43,p:'Middels',c:2,f:1},
  '4.1':{s:25,p:'Lav',c:2,f:0},'4.2':{s:52,p:'Middels',c:2,f:1},'4.3':{s:71,p:'Middels',c:3,f:1},
  '4.4':{s:23,p:'Lav',c:2,f:0},'4.5':{s:40,p:'Middels',c:2,f:1},'4.6':{s:32,p:'Lav',c:1,f:0},
  '5.1':{s:37,p:'Middels',c:2,f:1},'5.2':{s:96,p:'Høy',c:3,f:1},'5.3':{s:46,p:'Middels',c:3,f:1},
  '5.4':{s:62,p:'Middels',c:3,f:1},'5.5':{s:91,p:'Høy',c:3,f:1},'5.6':{s:74,p:'Høy',c:3,f:1},
  '6.1':{s:28,p:'Lav',c:0,f:0},'6.2':{s:65,p:'Middels',c:3,f:1},'6.3':{s:49,p:'Middels',c:3,f:1},
  '6.4':{s:79,p:'Høy',c:3,f:1},'6.5':{s:54,p:'Middels',c:2,f:1},'6.6':{s:84,p:'Høy',c:3,f:1},
  '7.1':{s:87,p:'Høy',c:3,f:1},'7.2':{s:58,p:'Middels',c:3,f:1},'7.3':{s:36,p:'Middels',c:3,f:0},
  '7.4':{s:42,p:'Middels',c:3,f:1},'7.5':{s:31,p:'Lav',c:1,f:0},'7.6':{s:76,p:'Høy',c:3,f:1},
  '8.1':{s:51,p:'Middels',c:2,f:0},'8.2':{s:80,p:'Høy',c:3,f:1},'8.3':{s:39,p:'Middels',c:1,f:0},
  '8.4':{s:70,p:'Middels',c:2,f:1},'8.5':{s:88,p:'Høy',c:3,f:1},'8.6':{s:61,p:'Middels',c:1,f:1},
  '9.1':{s:56,p:'Middels',c:3,f:1},'9.2':{s:27,p:'Lav',c:1,f:0},'9.3':{s:34,p:'Lav',c:1,f:0},
  '9.4':{s:45,p:'Middels',c:1,f:1},'9.5':{s:69,p:'Middels',c:3,f:1},'9.6':{s:72,p:'Middels',c:3,f:1},
  '10.1':{s:85,p:'Høy',c:2,f:1},'10.2':{s:50,p:'Middels',c:2,f:1},'10.3':{s:99,p:'Høy',c:3,f:1},
  '10.4':{s:93,p:'Høy',c:3,f:1},'10.5':{s:66,p:'Middels',c:3,f:1},'10.6':{s:75,p:'Høy',c:2,f:1},
  '11.1':{s:86,p:'Høy',c:3,f:1},'11.2':{s:90,p:'Høy',c:3,f:1},'11.3':{s:73,p:'Middels',c:3,f:1},
  '11.4':{s:44,p:'Middels',c:3,f:1},'11.5':{s:98,p:'Høy',c:3,f:1},'11.6':{s:60,p:'Middels',c:2,f:1},
  '12.1':{s:68,p:'Middels',c:3,f:1},'12.2':{s:97,p:'Høy',c:3,f:1},'12.3':{s:92,p:'Høy',c:3,f:1},
  '12.4':{s:33,p:'Lav',c:1,f:0},'12.5':{s:78,p:'Høy',c:3,f:1},'12.6':{s:53,p:'Middels',c:3,f:1},
  '13.1':{s:38,p:'Middels',c:1,f:0},'13.2':{s:30,p:'Lav',c:1,f:0},'13.3':{s:47,p:'Middels',c:1,f:1},
  '13.4':{s:63,p:'Middels',c:1,f:1},'13.5':{s:57,p:'Middels',c:2,f:1},'13.6':{s:83,p:'Høy',c:1,f:1},
};
const KAP_TITLE={
  1:'Penger, priser og preferanser',2:'Mer om valget mellom goder',3:'Konsumenter i arbeid',
  4:'Alternativ atferd',5:'Produksjon med to faktorer',6:'Kostnader',7:'Tilbud og profitt',
  8:'Tilbud og etterspørsel',9:'Handel og eksternaliteter',10:'Skatter og subsidier',
  11:'Monopol',12:'Oligopol',13:'Spillteori'
};
const DEL_INFO={
  'Del 1':{label:'Del 1',name:'Konsumentteori',sub:'Kapittel 1–4'},
  'Del 2':{label:'Del 2',name:'Produsentteori',sub:'Kapittel 5–7'},
  'Del 3':{label:'Del 3',name:'Marked og politikk',sub:'Kapittel 8–10'},
  'Del 4':{label:'Del 4',name:'Ufullkommen konkurranse',sub:'Kapittel 11–13'},
};
const SOURCES=['data/del1.txt','data/del2.txt','data/del3.txt','data/del4.txt'];
let TASKS=[];

function partFor(n){const c=+n.split('.')[0];return c<=4?'Del 1':c<=7?'Del 2':c<=10?'Del 3':'Del 4'}
function hasSaved(id){try{return!!localStorage.getItem('sam2_draw_'+id)}catch(e){return false}}
function pc(p){return p==='Høy'?'high':p==='Middels'?'mid':'low'}
function dots(n){return`<span class="calc-dots">${[0,1,2].map(i=>`<span class="${i<n?'on':'off'}">●</span>`).join('')}</span>`}

function parseTasks(txt){
  const re=/^((?:[1-9]|1[0-3])\.[1-6])\s+(.+)$/gm;
  const hits=[];let m;
  while((m=re.exec(txt)))hits.push({id:m[1],title:m[2].trim(),start:m.index});
  return hits.map((h,i)=>{
    const end=i+1<hits.length?hits[i+1].start:txt.length;
    const text=txt.slice(h.start,end).trim();
    const chap=+h.id.split('.')[0];
    const meta=META[h.id]||{s:0,p:'Lav',c:0,f:0};
    return{id:h.id,title:h.title,text,chap,kap:'Kap. '+chap,del:partFor(h.id),score:meta.s,prio:meta.p,calc:meta.c,full:meta.f};
  });
}

function renderHero(){
  const top=TASKS.slice().sort((a,b)=>b.score-a.score)[0];
  if(!top)return;
  document.getElementById('statTotal').textContent=TASKS.length;
  document.getElementById('statHigh').textContent=TASKS.filter(t=>t.prio==='Høy').length;
  document.getElementById('statAnswered').textContent=TASKS.filter(t=>hasSaved(t.id)).length;
  document.getElementById('featNr').textContent=top.id;
  document.getElementById('featTitle').textContent=top.title;
  document.getElementById('featMeta').textContent=`${top.del} · ${top.kap} · Score ${top.score}`;
  document.getElementById('heroFeatured').onclick=()=>openTask(top.id);
}

function renderNav(){
  const chaps=[...new Set(TASKS.map(t=>t.chap))].sort((a,b)=>a-b);
  document.getElementById('kapNav').innerHTML=chaps.map(c=>{
    const hasHigh=TASKS.some(t=>t.chap===c&&t.prio==='Høy');
    return`<a href="#kap${c}" class="kap-pill${hasHigh?' has-high':''}">${hasHigh?'<span class="kp-dot"></span>':''} ${c}</a>`;
  }).join('');
}

function renderContent(){
  const dels=['Del 1','Del 2','Del 3','Del 4'];
  let html='';
  dels.forEach(del=>{
    const info=DEL_INFO[del];
    html+=`<div class="del-break">
      <span class="del-break-label">${info.label}</span>
      <span class="del-break-name">${info.name}</span>
      <div class="del-break-line"></div>
      <span class="del-break-sub">${info.sub}</span>
    </div>`;

    const delTasks=TASKS.filter(t=>t.del===del);
    const chaps=[...new Set(delTasks.map(t=>t.chap))].sort((a,b)=>a-b);

    chaps.forEach(c=>{
      const tasks=delTasks.filter(t=>t.chap===c).sort((a,b)=>b.score-a.score);
      const highN=tasks.filter(t=>t.prio==='Høy').length;
      const midN=tasks.filter(t=>t.prio==='Middels').length;
      const lowN=tasks.filter(t=>t.prio==='Lav').length;

      html+=`<section class="kap-section" id="kap${c}">
        <div class="kap-header">
          <div class="kap-bg-num">${c}</div>
          <div class="kap-num-badge">${c}</div>
          <div class="kap-info">
            <h2>${KAP_TITLE[c]||'Kap. '+c}</h2>
            <div class="kap-info-meta">
              ${highN?`<span class="kap-pill-sm">${highN} høy</span>`:''}
              ${midN?`<span class="kap-pill-sm mid">${midN} middels</span>`:''}
              ${lowN?`<span class="kap-pill-sm low">${lowN} lav</span>`:''}
              <span class="kap-pill-sm neutral">${tasks.length} oppgaver</span>
            </div>
          </div>
        </div>
        <div class="task-list">
          ${tasks.map(t=>`
            <div class="task-row prio-${pc(t.prio)}" data-id="${t.id}">
              <span class="row-nr">${t.id}</span>
              <span class="row-title">${t.title}</span>
              <div class="row-right">
                <span class="badge ${pc(t.prio)}">${t.prio}</span>
                ${dots(t.calc)}
                ${t.full?'<span class="tag-xs">Full</span>':''}
                ${hasSaved(t.id)?'<span class="saved-dot" title="Besvart"></span>':''}
              </div>
            </div>`).join('')}
        </div>
      </section>`;
    });
  });
  document.getElementById('mainContent').innerHTML=html;
  document.querySelectorAll('.task-row').forEach(r=>r.addEventListener('click',()=>openTask(r.dataset.id)));
}

/* ── Canvas / Modal ── */
const modal=document.getElementById('modal'),canvas=document.getElementById('drawCanvas'),ctx=canvas.getContext('2d');
let activeId=null,drawing=false,tool='pen',penColor='#172033',penWidth=3;

function openTask(id){
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  activeId=id;
  document.getElementById('mId').textContent=t.id+' · '+t.del+' · '+t.kap;
  document.getElementById('mTitle').textContent=t.title;
  document.getElementById('mChips').innerHTML=
    `<span class="badge ${pc(t.prio)}">${t.prio} prioritet</span>`+
    `<span class="badge low">Score ${t.score}</span>`+
    `<span class="badge low">Regn ${t.calc}/3</span>`+
    (t.full?'<span class="badge low">Full metode</span>':'')+
    (hasSaved(id)?'<span class="badge" style="background:#dcfce7;color:#166534;border-color:#bbf7d0">Besvart ●</span>':'');
  document.getElementById('mText').textContent=t.text;
  modal.classList.add('open');document.body.style.overflow='hidden';
  requestAnimationFrame(()=>{sizeCanvas();loadCanvas(id);});
}

function closeTask(){
  modal.classList.remove('open');document.body.style.overflow='';drawing=false;activeId=null;
  renderHero();renderContent();
}

function sizeCanvas(){
  const w=document.getElementById('canvasWrap');
  canvas.width=w.clientWidth;canvas.height=w.clientHeight;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
}

function loadCanvas(id){
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  try{const s=localStorage.getItem('sam2_draw_'+id);if(s){const i=new Image();i.onload=()=>ctx.drawImage(i,0,0);i.src=s;}}catch(e){}
}

function saveCanvas(){
  if(!activeId)return;
  try{localStorage.setItem('sam2_draw_'+activeId,canvas.toDataURL());}catch(e){}
  const lbl=document.getElementById('saveLbl');lbl.textContent='Lagret ✓';clearTimeout(lbl._t);lbl._t=setTimeout(()=>lbl.textContent='',2500);
}

function getXY(e){const r=canvas.getBoundingClientRect();return[(e.clientX-r.left)*(canvas.width/r.width),(e.clientY-r.top)*(canvas.height/r.height)];}

canvas.addEventListener('pointerdown',e=>{e.preventDefault();canvas.setPointerCapture(e.pointerId);drawing=true;const[x,y]=getXY(e);ctx.beginPath();ctx.moveTo(x,y);});
canvas.addEventListener('pointermove',e=>{e.preventDefault();if(!drawing)return;const[x,y]=getXY(e);ctx.globalCompositeOperation='source-over';if(tool==='eraser'){ctx.strokeStyle='#fff';ctx.lineWidth=penWidth*6;}else{ctx.strokeStyle=penColor;let lw=penWidth;if(e.pressure>0&&e.pointerType==='pen')lw=Math.max(.5,lw*e.pressure*2.5);ctx.lineWidth=lw;}ctx.lineCap='round';ctx.lineJoin='round';ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);});
canvas.addEventListener('pointerup',e=>{if(!drawing)return;drawing=false;ctx.beginPath();saveCanvas();});
canvas.addEventListener('pointercancel',()=>{drawing=false;ctx.beginPath();});

function setTool(t){tool=t;document.getElementById('toolPen').classList.toggle('active',t==='pen');document.getElementById('toolEraser').classList.toggle('active',t==='eraser');}
document.getElementById('toolPen').onclick=()=>setTool('pen');
document.getElementById('toolEraser').onclick=()=>setTool('eraser');
document.getElementById('strokeWidth').oninput=e=>penWidth=+e.target.value;
document.getElementById('colorPicker').oninput=e=>{penColor=e.target.value;setTool('pen');};
document.getElementById('clearCanvas').onclick=()=>{if(confirm('Tøm tegneflaten for oppgave '+activeId+'?')){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);saveCanvas();}};
document.getElementById('closeBtn').onclick=closeTask;
modal.addEventListener('click',e=>{if(e.target===modal)closeTask();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modal.classList.contains('open'))closeTask();});

async function init(){
  try{
    const texts=await Promise.all(SOURCES.map(s=>fetch(s).then(r=>{if(!r.ok)throw new Error(s);return r.text();})));
    TASKS=parseTasks(texts.join('\n'));
    renderHero();renderNav();renderContent();
  }catch(e){
    document.getElementById('mainContent').innerHTML='<p style="padding:40px;color:#64748b">Kunne ikke laste oppgavetekster. Sjekk at <code>data/del1.txt</code> o.l. finnes.</p>';
  }
}
init();
</script>
</body></html>
