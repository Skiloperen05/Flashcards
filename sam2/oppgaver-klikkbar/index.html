<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAM2 oppgaveprioritering</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff7ed;--ink:#172033;--muted:#64748b;--line:#fed7aa;--accent:#d97706;--dark:#0f172a}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top left,#ffedd5 0,#fff7ed 35%,#f8fafc 100%);color:var(--ink);line-height:1.5}.top{height:64px;background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}.brand{color:#fff;text-decoration:none;font-weight:900;display:flex;gap:10px;align-items:center}.mark{width:32px;height:32px;border-radius:8px;background:#6366f1;display:grid;place-items:center}.crumb,.crumb a{color:#94a3b8;text-decoration:none;font-size:13px}.hero,main{max-width:1280px;margin:auto;padding:34px 22px 12px}.eyebrow{display:inline-flex;padding:6px 12px;border-radius:99px;background:#ffedd5;border:1px solid #fed7aa;color:#9a3412;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.hero h1{font-size:clamp(30px,5vw,50px);letter-spacing:-.055em;margin:12px 0 8px}.hero p{max-width:980px;color:#475569;margin:0}.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) 170px 160px 130px auto;gap:10px;margin-top:22px}.toolbar input,.toolbar select,.toolbar button{border:1px solid var(--line);background:#fff;border-radius:14px;padding:11px 13px;font:inherit;min-width:0}.toolbar button{font-weight:800;cursor:pointer}.meta{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 16px}.chip{background:#fff;border:1px solid #fed7aa;border-radius:999px;padding:7px 11px;color:#9a3412;font-size:12px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.task{background:#fff;border:1px solid #fed7aa;border-radius:20px;padding:16px;box-shadow:0 14px 35px rgba(120,53,15,.08);cursor:pointer;text-align:left;transition:transform .15s,box-shadow .15s}.task:hover{transform:translateY(-2px);box-shadow:0 20px 45px rgba(120,53,15,.13)}.task-top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}.nr{font-weight:900;color:#9a3412;background:#ffedd5;border:1px solid #fed7aa;border-radius:12px;padding:5px 9px}.badge{border-radius:99px;padding:4px 9px;font-size:12px;font-weight:900;background:#f8fafc;border:1px solid #e2e8f0;color:#475569}.high{background:#fee2e2;color:#991b1b;border-color:#fecaca}.mid{background:#fef3c7;color:#92400e;border-color:#fde68a}.low{background:#dcfce7;color:#166534;border-color:#bbf7d0}.task h3{margin:0;font-size:15px}.task p{margin:8px 0 0;color:#64748b;font-size:13px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal.open{display:flex}.dialog{background:#fff;border-radius:24px;max-width:940px;width:100%;max-height:88vh;overflow:hidden;box-shadow:0 30px 90px rgba(15,23,42,.35);border:1px solid #fed7aa;display:flex;flex-direction:column}.dialog-head{padding:18px 20px;border-bottom:1px solid #ffedd5;display:flex;gap:12px;justify-content:space-between;align-items:flex-start}.dialog-title h2{margin:0;font-size:22px}.dialog-title p{margin:4px 0 0;color:#64748b;font-size:13px}.close{border:0;background:#0f172a;color:#fff;border-radius:12px;padding:9px 12px;font-weight:900;cursor:pointer}.dialog-body{padding:20px;overflow:auto}.oppgave{white-space:pre-wrap;font-size:15px;line-height:1.65}.empty{background:#fff;border:1px solid #fed7aa;border-radius:18px;padding:18px;color:#7c2d12}@media(max-width:980px){.grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.crumb{display:none}}
</style>
</head>
<body>
<header class="top"><a class="brand" href="../../"><span class="mark">📚</span><span>StudieHub</span></a><div class="crumb"><a href="../../">Hjem</a> › <a href="../">SAM2</a> › Oppgaver</div></header>
<section class="hero"><span class="eyebrow">SAM2 øvingsfunksjon</span><h1>Oppgaveprioritering</h1><p>Klikk på en oppgave for å åpne kun den oppgaven. Fulltekstene hentes fra de fire oppgavefilene og deles automatisk opp på oppgavenummer.</p><div class="toolbar"><input id="search" placeholder="Søk oppgavenummer, tittel eller tekst"><select id="del"><option value="">Alle deler</option><option>Del 1</option><option>Del 2</option><option>Del 3</option><option>Del 4</option></select><select id="kap"><option value="">Alle kapitler</option></select><select id="sort"><option value="priority">Prioritert</option><option value="number">Oppgavenummer</option></select><button id="reset">Nullstill</button></div></section>
<main><div class="meta"><span class="chip" id="count">Laster oppgaver …</span><span class="chip">Klikk på kort for full oppgavetekst</span></div><div id="grid" class="grid"></div></main>
<div id="modal" class="modal" role="dialog" aria-modal="true"><div class="dialog"><div class="dialog-head"><div class="dialog-title"><h2 id="modalTitle"></h2><p id="modalMeta"></p></div><button class="close" id="close">Lukk</button></div><div class="dialog-body"><div id="modalText" class="oppgave"></div></div></div></div>
<script>
const SOURCES=['data/del1.txt','data/del2.txt','data/del3.txt','data/del4.txt'];
const PRIORITY=['10.3','11.5','12.2','5.2','1.4','2.3','10.4','12.3','5.5','11.2','3.3','8.5','7.1','11.1','10.1','6.6','13.6','3.2','2.5','8.2','6.4','12.5','2.1','7.6','10.6','5.6','11.3','9.6','4.3','8.4','9.5','12.1','3.5','10.5','6.2','2.2','13.4','5.4','8.6','11.6','3.4','7.2','13.5','9.1','1.3','6.5','12.6','4.2','8.1','10.2','6.3','2.6','13.3','5.3','9.4','11.4','3.6','7.4','1.2','4.5','8.3','13.1','5.1','7.3','2.4','9.3','12.4','4.6','7.5','13.2','1.6','6.1','9.2','1.1','1.5','3.1','4.1','4.4'];
const byId=x=>document.getElementById(x); let TASKS=[];
function partFor(n){const c=+n.split('.')[0]; return c<=4?'Del 1':c<=7?'Del 2':c<=10?'Del 3':'Del 4'}
function prioFor(id){const i=PRIORITY.indexOf(id); return i<0?0:100-i}
function badgeClass(score){return score>=75?'high':score>=40?'mid':'low'}
function parseTasks(allText){const re=/^((?:[1-9]|1[0-3])\.[1-6])\s+(.+)$/gm; const hits=[]; let m; while((m=re.exec(allText))){hits.push({id:m[1],title:m[2].trim(),start:m.index});} return hits.map((h,i)=>{const end=i+1<hits.length?hits[i+1].start:allText.length; const text=allText.slice(h.start,end).trim(); const chap=+h.id.split('.')[0]; return {id:h.id,title:h.title,text,chapter:chap,kap:'Kap. '+chap,del:partFor(h.id),score:prioFor(h.id)};});}
function numericCmp(a,b){const [ac,an]=a.id.split('.').map(Number),[bc,bn]=b.id.split('.').map(Number); return ac-bc||an-bn}
function render(){const q=byId('search').value.toLowerCase().trim(), d=byId('del').value, k=byId('kap').value, s=byId('sort').value; let rows=TASKS.filter(t=>(!d||t.del===d)&&(!k||t.kap===k)&&(!q||(t.id+' '+t.title+' '+t.text).toLowerCase().includes(q))); rows.sort(s==='number'?numericCmp:(a,b)=>b.score-a.score||numericCmp(a,b)); byId('count').textContent=rows.length+' av '+TASKS.length+' oppgaver'; byId('grid').innerHTML=rows.length?rows.map(t=>`<button class="task" data-id="${t.id}"><div class="task-top"><span class="nr">${t.id}</span><span class="badge ${badgeClass(t.score)}">${t.score?('Prioritet '+t.score):'Oppgave'}</span></div><h3>${t.title}</h3><p>${t.del} · ${t.kap}. Klikk for oppgavetekst.</p></button>`).join(''):'<div class="empty">Ingen oppgaver matcher filtrene.</div>';}
function openTask(id){const t=TASKS.find(x=>x.id===id); if(!t)return; byId('modalTitle').textContent=t.id+' '+t.title; byId('modalMeta').textContent=t.del+' · '+t.kap+(t.score?' · prioritet '+t.score:''); byId('modalText').textContent=t.text; byId('modal').classList.add('open');}
async function init(){try{const texts=await Promise.all(SOURCES.map(s=>fetch(s).then(r=>{if(!r.ok)throw new Error(s); return r.text();}))); TASKS=parseTasks(texts.join('\n')); const chapters=[...new Set(TASKS.map(t=>t.kap))].sort((a,b)=>parseInt(a.replace(/\D/g,''))-parseInt(b.replace(/\D/g,''))); byId('kap').innerHTML='<option value="">Alle kapitler</option>'+chapters.map(c=>`<option>${c}</option>`).join(''); render();}catch(e){byId('count').textContent='Kunne ikke laste oppgaver'; byId('grid').innerHTML='<div class="empty">Oppgavetekstene kunne ikke lastes. Sjekk at datafilene ligger i <code>sam2/oppgaver-klikkbar/data/</code>.</div>';}}
byId('grid').addEventListener('click',e=>{const b=e.target.closest('.task'); if(b)openTask(b.dataset.id);}); ['search','del','kap','sort'].forEach(id=>byId(id).addEventListener('input',render)); byId('reset').onclick=()=>{byId('search').value='';byId('del').value='';byId('kap').value='';byId('sort').value='priority';render();}; byId('close').onclick=()=>byId('modal').classList.remove('open'); byId('modal').addEventListener('click',e=>{if(e.target.id==='modal')e.currentTarget.classList.remove('open')}); document.addEventListener('keydown',e=>{if(e.key==='Escape')byId('modal').classList.remove('open')}); init();
</script>
</body></html>
